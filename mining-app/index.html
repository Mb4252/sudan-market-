<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💎 CRYSTAL Exchange - منصة تداول احترافية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.0/dist/chartjs-chart-financial.min.js"></script>
    <style>
        :root {
            --bg-primary: #0b0e11;
            --bg-secondary: #1e2329;
            --bg-tertiary: #2a2e35;
            --text-primary: #eaecef;
            --text-secondary: #848e9c;
            --green: #0ecb81;
            --red: #f6465d;
            --gold: #f0b90b;
            --blue: #3b82f6;
            --border: #2b3139;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 13px;
        }

        .app { max-width: 480px; margin: 0 auto; padding: 8px; }

        /* الهيدر */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .header .pair { font-size: 16px; font-weight: bold; color: var(--gold); }
        .header .price-info { text-align: left; }
        .header .current-price { font-size: 18px; font-weight: bold; }
        .header .price-change { font-size: 11px; }
        .price-up { color: var(--green); }
        .price-down { color: var(--red); }

        /* شريط الرصيد */
        .balance-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .balance-item {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 6px 10px;
            text-align: center;
            font-size: 11px;
        }
        .balance-item .label { color: var(--text-secondary); font-size: 10px; }
        .balance-item .value { font-weight: bold; font-size: 13px; margin-top: 2px; }

        /* الرسم البياني */
        .chart-container {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            height: 280px;
            position: relative;
        }
        .timeframe-btns {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }
        .tf-btn {
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .tf-btn.active { background: var(--gold); color: #000; }

        /* دفتر الطلبات + التداول */
        .trade-area {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .order-book-mini {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 6px;
            font-size: 10px;
            max-height: 200px;
            overflow: hidden;
        }
        .ob-title {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            text-align: center;
        }
        .ob-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            position: relative;
        }
        .ob-row .price { flex: 1; }
        .ob-row .amount { flex: 1; text-align: center; }
        .ob-row .total { flex: 1; text-align: left; }
        .ob-row.buy .price { color: var(--green); }
        .ob-row.sell .price { color: var(--red); }

        /* قسم إنشاء الطلب */
        .trade-form {
            flex: 1.5;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px;
        }
        .trade-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }
        .trade-tab {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .trade-tab.buy-tab { background: rgba(14,203,129,0.15); color: var(--green); }
        .trade-tab.sell-tab { background: rgba(246,70,93,0.15); color: var(--red); }
        .trade-tab.active.buy-tab { background: var(--green); color: #000; }
        .trade-tab.active.sell-tab { background: var(--red); color: #fff; }

        .input-group { margin-bottom: 6px; }
        .input-group label { font-size: 10px; color: var(--text-secondary); display: block; margin-bottom: 2px; }
        .input-group input {
            width: 100%;
            padding: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
        }

        /* شريط التمرير */
        .slider-container { margin: 8px 0; }
        .slider-container input[type=range] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: var(--bg-tertiary);
            border-radius: 2px;
            outline: none;
        }
        .slider-container input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--gold);
            border-radius: 50%;
            cursor: pointer;
        }
        .quick-btns {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .quick-btn {
            flex: 1;
            padding: 4px;
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-secondary);
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
        .quick-btn:hover { background: var(--border); color: #fff; }

        .trade-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
        }
        .trade-btn.buy-btn { background: var(--green); color: #000; }
        .trade-btn.sell-btn { background: var(--red); color: #fff; }
        .trade-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* التبويبات السفلية */
        .bottom-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            overflow-x: auto;
        }
        .bottom-tab {
            padding: 6px 10px;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            white-space: nowrap;
        }
        .bottom-tab.active { background: var(--gold); color: #000; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .loading { text-align: center; padding: 20px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app">
        <!-- الهيدر -->
        <div class="header">
            <div>
                <div class="pair">💎 CRYSTAL/USDT</div>
                <div style="font-size:10px;color:var(--text-secondary)">500 حبة = 1 USDT</div>
            </div>
            <div class="price-info">
                <div class="current-price" id="headerPrice">0.0020</div>
                <div class="price-change" id="headerChange">0.00%</div>
            </div>
        </div>

        <!-- شريط الرصيد -->
        <div class="balance-bar">
            <div class="balance-item">
                <div class="label">💎 CRYSTAL</div>
                <div class="value" id="crystalBalance">0</div>
            </div>
            <div class="balance-item">
                <div class="label">💵 USDT</div>
                <div class="value" id="usdtBalance">0</div>
            </div>
            <div class="balance-item" id="kycBadge" style="display:flex;align-items:center;justify-content:center;">
                <span id="kycStatus">⚠️</span>
            </div>
        </div>

        <!-- الرسم البياني -->
        <div class="chart-container">
            <div class="timeframe-btns">
                <button class="tf-btn active" onclick="setTimeframe('1m')">1د</button>
                <button class="tf-btn" onclick="setTimeframe('5m')">5د</button>
                <button class="tf-btn" onclick="setTimeframe('15m')">15د</button>
                <button class="tf-btn" onclick="setTimeframe('1h')">1س</button>
            </div>
            <canvas id="priceChart"></canvas>
        </div>

        <!-- دفتر الطلبات + التداول -->
        <div class="trade-area">
            <!-- دفتر الطلبات المصغر -->
            <div class="order-book-mini">
                <div class="ob-title" style="color:var(--red)">🔴 بيع</div>
                <div id="sellOrderBook"></div>
                <div style="text-align:center;padding:6px;font-weight:bold;color:var(--gold);font-size:13px;" id="midPrice">0.0020</div>
                <div class="ob-title" style="color:var(--green)">🟢 شراء</div>
                <div id="buyOrderBook"></div>
            </div>

            <!-- نموذج التداول -->
            <div class="trade-form">
                <div class="trade-tabs">
                    <button class="trade-tab buy-tab active" id="buyTab" onclick="setOrderType('buy')">🟢 شراء</button>
                    <button class="trade-tab sell-tab" id="sellTab" onclick="setOrderType('sell')">🔴 بيع</button>
                </div>
                
                <div class="input-group">
                    <label>السعر (USDT)</label>
                    <input type="number" id="orderPrice" placeholder="0.0020" step="0.0001" oninput="updateOrderTotal()" value="0.002">
                </div>
                
                <div class="input-group">
                    <label>الكمية (CRYSTAL)</label>
                    <input type="number" id="orderAmount" placeholder="100" step="1" oninput="syncSliderFromInput()" value="100">
                </div>
                
                <!-- شريط التمرير -->
                <div class="slider-container">
                    <input type="range" id="amountSlider" min="1" max="100" value="100" oninput="syncInputFromSlider()">
                    <div class="quick-btns">
                        <button class="quick-btn" onclick="setAmountPercent(25)">25%</button>
                        <button class="quick-btn" onclick="setAmountPercent(50)">50%</button>
                        <button class="quick-btn" onclick="setAmountPercent(75)">75%</button>
                        <button class="quick-btn" onclick="setAmountPercent(100)">100%</button>
                    </div>
                </div>
                
                <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);margin:4px 0;">
                    <span>الإجمالي: <b id="orderTotal" style="color:#fff">0.2000</b> USDT</span>
                    <span>الرسوم: <b id="orderFee">0.0002</b></span>
                </div>
                
                <button class="trade-btn buy-btn" id="createOrderBtn" onclick="createOrder()">✅ شراء CRYSTAL</button>
                <div id="orderMessage" style="margin-top:6px;font-size:11px;text-align:center;"></div>
            </div>
        </div>

        <!-- التبويبات السفلية -->
        <div class="bottom-tabs">
            <button class="bottom-tab active" onclick="switchBottomTab('orders')">📋 طلباتي</button>
            <button class="bottom-tab" onclick="switchBottomTab('history')">📜 تاريخي</button>
            <button class="bottom-tab" onclick="switchBottomTab('wallet')">💼 محفظة</button>
            <button class="bottom-tab" onclick="switchBottomTab('kyc')">🆔 توثيق</button>
            <button class="bottom-tab" onclick="switchBottomTab('referral')">🎁 إحالات</button>
            <button class="bottom-tab" onclick="switchBottomTab('chat')">💬 دردشة</button>
        </div>

        <!-- محتوى التبويبات -->
        <div id="panel-orders" class="tab-panel active">
            <div class="card">
                <h4 style="margin-bottom:8px;">📋 طلباتي النشطة</h4>
                <div id="myOrdersList"><div class="loading">جاري التحميل...</div></div>
            </div>
        </div>

        <div id="panel-history" class="tab-panel">
            <div class="card">
                <h4 style="margin-bottom:8px;">📜 سجل الصفقات</h4>
                <div id="tradeHistoryList"><div class="loading">جاري التحميل...</div></div>
            </div>
        </div>

        <div id="panel-wallet" class="tab-panel">
            <div class="card">
                <h4 style="margin-bottom:8px;">💼 المحفظة</h4>
                <div style="margin-bottom:8px;">
                    <label style="font-size:10px;">الشبكة</label>
                    <select id="depositNetwork" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <option value="bnb">BNB (BEP-20)</option>
                        <option value="polygon">Polygon</option>
                        <option value="solana">Solana</option>
                    </select>
                    <input type="number" id="depositAmount" placeholder="المبلغ (USDT)" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                    <button class="trade-btn buy-btn" onclick="deposit()" id="depositBtn">📥 إيداع</button>
                </div>
                <div style="margin-top:8px;">
                    <input type="number" id="withdrawAmount" placeholder="المبلغ (USDT)" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                    <input type="text" id="withdrawAddress" placeholder="عنوان المحفظة" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                    <button class="trade-btn sell-btn" onclick="withdraw()" id="withdrawBtn">📤 سحب</button>
                </div>
            </div>
        </div>

        <div id="panel-kyc" class="tab-panel">
            <div class="card">
                <h4 style="margin-bottom:8px;">🆔 توثيق الهوية</h4>
                <div id="kycPanel"><div class="loading">جاري التحميل...</div></div>
            </div>
        </div>

        <div id="panel-referral" class="tab-panel">
            <div class="card">
                <h4 style="margin-bottom:8px;">🎁 الإحالات</h4>
                <div id="referralPanel"><div class="loading">جاري التحميل...</div></div>
            </div>
        </div>

        <div id="panel-chat" class="tab-panel">
            <div class="card" style="height:300px;display:flex;flex-direction:column;">
                <div id="chatMessages" style="flex:1;overflow-y:auto;margin-bottom:8px;font-size:11px;"></div>
                <div style="display:flex;gap:4px;">
                    <input type="text" id="chatMessage" placeholder="اكتب رسالة..." style="flex:1;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;">
                    <button class="trade-btn buy-btn" onclick="sendChatMessage()" style="width:auto;padding:8px 16px;margin:0;">📤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const API_URL = window.location.origin;
        let currentTimeframe = '1m';
        let currentOrderType = 'buy';
        let priceChart = null;
        let userId = tg.initDataUnsafe?.user?.id || 6701743450;

        // ========== التهيئة ==========
        function init() {
            loadAllData();
            setInterval(loadMarketData, 5000);
            setInterval(loadOrderBook, 3000);
            updateOrderTotal();
        }

        async function loadAllData() {
            loadUserData();
            loadMarketData();
            loadOrderBook();
            loadChart();
            loadMyOrders();
            loadKycPanel();
            loadReferralPanel();
            loadChatMessages();
        }

        // ========== بيانات المستخدم ==========
        async function loadUserData() {
            try {
                const res = await fetch(`${API_URL}/api/user/${userId}`);
                const data = await res.json();
                document.getElementById('crystalBalance').textContent = (data.crystalBalance || 0).toFixed(2);
                document.getElementById('usdtBalance').textContent = (data.usdtBalance || 0).toFixed(2);
                document.getElementById('kycStatus').innerHTML = data.isVerified ? '✅' : '⚠️';
                updateSliderMax();
            } catch(e) { console.error(e); }
        }

        // ========== السوق ==========
        async function loadMarketData() {
            try {
                const res = await fetch(`${API_URL}/api/market/stats`);
                const data = await res.json();
                const price = data.price || 0.002;
                document.getElementById('headerPrice').textContent = price.toFixed(4);
                document.getElementById('midPrice').textContent = price.toFixed(4);
                document.getElementById('orderPrice').value = price.toFixed(4);
                
                const change = data.change24h || 0;
                const changeEl = document.getElementById('headerChange');
                changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                changeEl.className = 'price-change ' + (change >= 0 ? 'price-up' : 'price-down');
            } catch(e) { console.error(e); }
        }

        // ========== دفتر الطلبات ==========
        async function loadOrderBook() {
            try {
                // البيع
                const sellRes = await fetch(`${API_URL}/api/orders?type=sell&limit=10`);
                const sellData = await sellRes.json();
                const sells = sellData.orders || [];
                let sellHtml = '';
                for (const o of sells) {
                    sellHtml += `<div class="ob-row sell"><span class="price">${o.price.toFixed(4)}</span><span class="amount">${o.amount.toFixed(0)}</span><span class="total">${(o.price*o.amount).toFixed(2)}</span></div>`;
                }
                document.getElementById('sellOrderBook').innerHTML = sellHtml || '<div style="color:var(--text-secondary);text-align:center;">-</div>';
                
                // الشراء
                const buyRes = await fetch(`${API_URL}/api/orders?type=buy&limit=10`);
                const buyData = await buyRes.json();
                const buys = buyData.orders || [];
                let buyHtml = '';
                for (const o of buys) {
                    buyHtml += `<div class="ob-row buy"><span class="price">${o.price.toFixed(4)}</span><span class="amount">${o.amount.toFixed(0)}</span><span class="total">${(o.price*o.amount).toFixed(2)}</span></div>`;
                }
                document.getElementById('buyOrderBook').innerHTML = buyHtml || '<div style="color:var(--text-secondary);text-align:center;">-</div>';
            } catch(e) { console.error(e); }
        }

        // ========== الرسم البياني ==========
        async function loadChart() {
            try {
                const res = await fetch(`${API_URL}/api/market/candles/${currentTimeframe}?limit=50`);
                const candles = await res.json();
                if (!candles || candles.length === 0) return;
                
                const labels = candles.map(c => new Date(c.timestamp).toLocaleTimeString('ar-SA', {hour:'2-digit',minute:'2-digit'}));
                const prices = candles.map(c => c.close);
                
                if (priceChart) priceChart.destroy();
                
                const ctx = document.getElementById('priceChart').getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, 0, 280);
                gradient.addColorStop(0, 'rgba(14,203,129,0.3)');
                gradient.addColorStop(1, 'rgba(14,203,129,0)');
                
                priceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: prices,
                            borderColor: '#0ecb81',
                            borderWidth: 1.5,
                            backgroundColor: gradient,
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#848e9c', font: { size: 10 } } },
                            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#848e9c', font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 } }
                        },
                        interaction: { intersect: false, mode: 'index' }
                    }
                });
            } catch(e) { console.error(e); }
        }

        function setTimeframe(tf) {
            currentTimeframe = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadChart();
        }

        // ========== التداول ==========
        function setOrderType(type) {
            currentOrderType = type;
            document.getElementById('buyTab').classList.toggle('active', type === 'buy');
            document.getElementById('sellTab').classList.toggle('active', type === 'sell');
            const btn = document.getElementById('createOrderBtn');
            btn.textContent = type === 'buy' ? '✅ شراء CRYSTAL' : '🔴 بيع CRYSTAL';
            btn.className = 'trade-btn ' + (type === 'buy' ? 'buy-btn' : 'sell-btn');
            updateSliderMax();
            updateOrderTotal();
        }

        function updateOrderTotal() {
            const price = parseFloat(document.getElementById('orderPrice').value) || 0;
            const amount = parseFloat(document.getElementById('orderAmount').value) || 0;
            const total = price * amount;
            const fee = total * 0.001;
            document.getElementById('orderTotal').textContent = total.toFixed(4);
            document.getElementById('orderFee').textContent = fee.toFixed(4);
        }

        function updateSliderMax() {
            const slider = document.getElementById('amountSlider');
            if (currentOrderType === 'sell') {
                const balance = parseFloat(document.getElementById('crystalBalance').textContent) || 0;
                slider.max = Math.max(1, Math.floor(balance));
            } else {
                const price = parseFloat(document.getElementById('orderPrice').value) || 0.002;
                const balance = parseFloat(document.getElementById('usdtBalance').textContent) || 0;
                const maxAmount = balance / (price * 1.001);
                slider.max = Math.max(1, Math.floor(maxAmount));
            }
        }

        function syncInputFromSlider() {
            const val = parseFloat(document.getElementById('amountSlider').value);
            document.getElementById('orderAmount').value = val;
            updateOrderTotal();
        }

        function syncSliderFromInput() {
            const val = parseFloat(document.getElementById('orderAmount').value) || 1;
            document.getElementById('amountSlider').value = val;
            updateOrderTotal();
        }

        function setAmountPercent(percent) {
            const slider = document.getElementById('amountSlider');
            const max = parseFloat(slider.max);
            const amount = Math.floor(max * percent / 100);
            document.getElementById('orderAmount').value = Math.max(1, amount);
            document.getElementById('amountSlider').value = Math.max(1, amount);
            updateOrderTotal();
        }

        async function createOrder() {
            const price = parseFloat(document.getElementById('orderPrice').value);
            const amount = parseFloat(document.getElementById('orderAmount').value);
            const btn = document.getElementById('createOrderBtn');
            
            if (!price || price <= 0) { tg.showAlert('⚠️ أدخل السعر'); return; }
            if (!amount || amount <= 0) { tg.showAlert('⚠️ أدخل الكمية'); return; }
            
            btn.disabled = true;
            btn.textContent = '⏳ جاري التنفيذ...';
            
            try {
                const res = await fetch(`${API_URL}/api/order/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, type: currentOrderType, price, amount })
                });
                const result = await res.json();
                
                const msgDiv = document.getElementById('orderMessage');
                if (result.success) {
                    msgDiv.innerHTML = `<span style="color:var(--green)">${result.message}</span>`;
                    loadAllData();
                } else {
                    msgDiv.innerHTML = `<span style="color:var(--red)">${result.message}</span>`;
                }
                tg.showAlert(result.message);
            } catch(e) {
                tg.showAlert('❌ حدث خطأ');
            } finally {
                btn.disabled = false;
                btn.textContent = currentOrderType === 'buy' ? '✅ شراء CRYSTAL' : '🔴 بيع CRYSTAL';
            }
        }

        // ========== طلباتي ==========
        async function loadMyOrders() {
            try {
                const res = await fetch(`${API_URL}/api/orders/${userId}`);
                const orders = await res.json();
                const container = document.getElementById('myOrdersList');
                if (!orders.length) { container.innerHTML = '<div class="loading">لا توجد طلبات</div>'; return; }
                
                let html = '';
                for (const o of orders) {
                    const color = o.type === 'buy' ? 'var(--green)' : 'var(--red)';
                    html += `<div style="border-right:3px solid ${color};padding:8px;margin-bottom:6px;background:var(--bg-tertiary);border-radius:4px;">
                        <div style="display:flex;justify-content:space-between;"><b>${o.type==='buy'?'🟢 شراء':'🔴 بيع'}</b><span>${o.status==='open'?'⏳':'🔄'}</span></div>
                        <div>💰 ${o.price.toFixed(4)} USDT | 📦 ${o.amount.toFixed(2)}/${o.originalAmount.toFixed(2)}</div>
                        ${o.status==='open'||o.status==='partial'?`<button onclick="cancelOrder('${o._id}')" style="margin-top:4px;padding:4px 8px;background:var(--red);border:none;color:#fff;border-radius:3px;cursor:pointer;">❌ إلغاء</button>`:''}
                    </div>`;
                }
                container.innerHTML = html;
            } catch(e) {}
        }

        async function cancelOrder(orderId) {
            try {
                const res = await fetch(`${API_URL}/api/order/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, user_id: userId })
                });
                const result = await res.json();
                tg.showAlert(result.message);
                loadAllData();
            } catch(e) { tg.showAlert('❌ خطأ'); }
        }

        // ========== المحفظة ==========
        async function deposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const network = document.getElementById('depositNetwork').value;
            const btn = document.getElementById('depositBtn');
            if (!amount || amount < 1) { tg.showAlert('⚠️ الحد الأدنى 1 USDT'); return; }
            
            btn.disabled = true;
            try {
                const res = await fetch(`${API_URL}/api/deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, amount, network })
                });
                const result = await res.json();
                if (result.address) {
                    await navigator.clipboard.writeText(result.address);
                    tg.showAlert(`📤 العنوان:\n${result.address}\n\n(تم النسخ)`);
                } else {
                    tg.showAlert(result.message);
                }
            } catch(e) { tg.showAlert('❌ خطأ'); }
            finally { btn.disabled = false; }
        }

        async function withdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const address = document.getElementById('withdrawAddress').value.trim();
            const network = document.getElementById('depositNetwork').value;
            if (!amount || amount < 5) { tg.showAlert('⚠️ الحد الأدنى 5 USDT'); return; }
            if (!address) { tg.showAlert('⚠️ أدخل العنوان'); return; }
            
            try {
                const res = await fetch(`${API_URL}/api/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, amount, network, address })
                });
                const result = await res.json();
                tg.showAlert(result.message);
                loadUserData();
            } catch(e) { tg.showAlert('❌ خطأ'); }
        }

        // ========== KYC ==========
        async function loadKycPanel() {
            try {
                const res = await fetch(`${API_URL}/api/kyc/status/${userId}`);
                const data = await res.json();
                const container = document.getElementById('kycPanel');
                if (data.status === 'approved') {
                    container.innerHTML = '<div style="color:var(--green);font-size:16px;">✅ حساب موثق</div>';
                } else if (data.status === 'pending') {
                    container.innerHTML = '<div style="color:var(--gold);font-size:16px;">⏳ قيد المراجعة</div>';
                } else {
                    container.innerHTML = `
                        <input type="text" id="kycFullName" placeholder="الاسم الكامل" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <input type="text" id="kycPassport" placeholder="رقم الجواز" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <input type="text" id="kycNationalId" placeholder="الرقم الوطني" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <input type="tel" id="kycPhone" placeholder="رقم الهاتف" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <input type="text" id="kycBankName" placeholder="اسم البنك" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <input type="text" id="kycAccountNumber" placeholder="رقم الحساب" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <input type="text" id="kycAccountName" placeholder="اسم صاحب الحساب" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:#fff;margin:4px 0;">
                        <div style="margin:6px 0;">
                            <label style="font-size:10px;">صورة الجواز</label>
                            <input type="file" id="passportPhoto" accept="image/*" onchange="previewFile(this,'passportPreview')" style="margin:4px 0;">
                            <div id="passportPreview"></div>
                        </div>
                        <div style="margin:6px 0;">
                            <label style="font-size:10px;">صورة شخصية</label>
                            <input type="file" id="personalPhoto" accept="image/*" onchange="previewFile(this,'personalPreview')" style="margin:4px 0;">
                            <div id="personalPreview"></div>
                        </div>
                        <button class="trade-btn buy-btn" onclick="submitKyc()">📤 إرسال</button>`;
                }
            } catch(e) {}
        }

        function previewFile(input, previewId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" style="max-width:100%;border-radius:4px;margin-top:4px;">`; };
                reader.readAsDataURL(file);
            }
        }

        async function submitKyc() {
            const fullName = document.getElementById('kycFullName')?.value;
            const passport = document.getElementById('kycPassport')?.value;
            const nationalId = document.getElementById('kycNationalId')?.value;
            const phone = document.getElementById('kycPhone')?.value;
            const bankName = document.getElementById('kycBankName')?.value || '';
            const accountNum = document.getElementById('kycAccountNumber')?.value || '';
            const accountName = document.getElementById('kycAccountName')?.value || '';
            const passportFile = document.getElementById('passportPhoto')?.files[0];
            const personalFile = document.getElementById('personalPhoto')?.files[0];
            
            if (!fullName || !passport || !nationalId || !phone) { tg.showAlert('⚠️ املأ جميع الحقول'); return; }
            if (!passportFile || !personalFile) { tg.showAlert('⚠️ ارفع الصور'); return; }
            
            const formData = new FormData();
            formData.append('user_id', userId);
            formData.append('fullName', fullName);
            formData.append('passportNumber', passport);
            formData.append('nationalId', nationalId);
            formData.append('phoneNumber', phone);
            formData.append('email', '');
            formData.append('country', 'SD');
            formData.append('city', '');
            formData.append('bankName', bankName);
            formData.append('bankAccountNumber', accountNum);
            formData.append('bankAccountName', accountName);
            formData.append('passportPhoto', passportFile);
            formData.append('personalPhoto', personalFile);
            
            try {
                const res = await fetch(`${API_URL}/api/kyc/submit`, { method: 'POST', body: formData });
                const result = await res.json();
                tg.showAlert(result.message);
                loadKycPanel();
            } catch(e) { tg.showAlert('❌ خطأ'); }
        }

        // ========== الإحالات ==========
        async function loadReferralPanel() {
            try {
                const res = await fetch(`${API_URL}/api/user/referral/${userId}`);
                const data = await res.json();
                document.getElementById('referralPanel').innerHTML = `
                    <div>👥 المدعوين: <b>${data.referralCount}</b></div>
                    <div>💰 الأرباح: <b>${(data.referralEarnings||0).toFixed(2)} CRYSTAL</b></div>
                    <div style="background:var(--bg-tertiary);padding:6px;border-radius:4px;margin:8px 0;word-break:break-all;font-size:10px;">${data.referralLink}</div>
                    <button class="trade-btn buy-btn" onclick="copyReferral()">📋 نسخ الرابط</button>
                    <button class="trade-btn buy-btn" onclick="transferReferral()" style="margin-top:4px;">💸 تحويل للمحفظة</button>`;
            } catch(e) {}
        }

        function copyReferral() {
            const link = document.getElementById('referralPanel').querySelector('div').nextElementSibling?.nextElementSibling?.textContent;
            if (link) { navigator.clipboard.writeText(link); tg.showAlert('✅ تم النسخ'); }
        }

        async function transferReferral() {
            try {
                const res = await fetch(`${API_URL}/api/referral/transfer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const result = await res.json();
                tg.showAlert(result.message);
                loadReferralPanel();
                loadUserData();
            } catch(e) { tg.showAlert('❌ خطأ'); }
        }

        // ========== الدردشة ==========
        async function loadChatMessages() {
            try {
                const res = await fetch(`${API_URL}/api/chat/global`);
                const messages = await res.json();
                const container = document.getElementById('chatMessages');
                let html = '';
                for (const msg of (messages||[]).slice(-20)) {
                    const isMe = msg.senderId == userId;
                    html += `<div style="margin-bottom:4px;padding:4px 8px;border-radius:8px;background:${isMe?'rgba(59,130,246,0.2)':'var(--bg-tertiary)'};max-width:85%;${isMe?'margin-right:auto;':''}"><b>${isMe?'أنت':msg.senderId}:</b> ${msg.message}</div>`;
                }
                container.innerHTML = html || '<div class="loading">لا توجد رسائل</div>';
                container.scrollTop = container.scrollHeight;
            } catch(e) {}
        }

        async function sendChatMessage() {
            const msg = document.getElementById('chatMessage').value.trim();
            if (!msg) return;
            try {
                await fetch(`${API_URL}/api/chat/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: userId, message: msg })
                });
                document.getElementById('chatMessage').value = '';
                loadChatMessages();
            } catch(e) {}
        }

        // ========== تبويبات ==========
        function switchBottomTab(tab) {
            document.querySelectorAll('.bottom-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
            if (tab === 'orders') loadMyOrders();
            if (tab === 'history') loadTradeHistory();
            if (tab === 'kyc') loadKycPanel();
            if (tab === 'referral') loadReferralPanel();
            if (tab === 'chat') loadChatMessages();
        }

        async function loadTradeHistory() {
            try {
                const res = await fetch(`${API_URL}/api/user/trades/${userId}`);
                const trades = await res.json();
                const container = document.getElementById('tradeHistoryList');
                if (!trades.length) { container.innerHTML = '<div class="loading">لا توجد صفقات</div>'; return; }
                let html = '';
                for (const t of trades.slice(0, 10)) {
                    const isBuyer = t.buyerId == userId;
                    html += `<div style="padding:6px;margin-bottom:4px;background:var(--bg-tertiary);border-radius:4px;border-right:3px solid ${isBuyer?'var(--green)':'var(--red)'};">
                        <div>${isBuyer?'🟢 شراء':'🔴 بيع'} | ${new Date(t.createdAt).toLocaleString('ar-SA')}</div>
                        <div>💰 ${t.price} | 📦 ${t.amount} | 💵 ${t.totalUsdt}</div></div>`;
                }
                container.innerHTML = html;
            } catch(e) {}
        }

        // ========== بدء التشغيل ==========
        init();
    </script>
</body>
</html>
