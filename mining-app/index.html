<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CRYSTAL - منصة التداول</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .balance-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; }
        .balance-amount { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .price-info { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-button { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 10px; color: white; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .tab-button.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .trade-input { width: 100%; padding: 12px; border: none; border-radius: 10px; margin: 10px 0; background: rgba(255,255,255,0.9); }
        .trade-btn { background: #4CAF50; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .sell-btn { background: #f44336; }
        .price-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .leader-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; }
        .lang-btn { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin: 0 5px; }
        .copy-btn { background: #2196F3; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .address-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 5px 0; color: #fff; }
        .loading { text-align: center; padding: 20px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card balance-card">
            <h2>💎 CRYSTAL</h2>
            <div class="balance-amount" id="crystalBalance">0</div>
            <div class="price-info">💰 <span id="usdBalance">0</span> USD | 📊 <span id="crystalPrice">0</span> USD</div>
        </div>

        <div style="text-align: center; margin-bottom: 15px;">
            <button class="lang-btn" onclick="setLanguage('ar')">🇸🇦 العربية</button>
            <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 English</button>
        </div>

        <div class="tab-buttons">
            <button class="tab-button active" onclick="switchTab('trade')">📈 تداول</button>
            <button class="tab-button" onclick="switchTab('p2p')">📊 P2P</button>
            <button class="tab-button" onclick="switchTab('wallet')">💼 محفظتي</button>
            <button class="tab-button" onclick="switchTab('leaderboard')">🏆 متصدرين</button>
            <button class="tab-button" onclick="switchTab('prices')">📊 الأسعار</button>
        </div>

        <!-- تداول -->
        <div id="trade-tab" class="tab-content active">
            <div class="card">
                <h3 style="color:white">📈 شراء / بيع CRYSTAL</h3>
                <input type="number" id="tradeAmount" placeholder="المبلغ بالدولار" class="trade-input">
                <button class="trade-btn" onclick="buyCrystal()">🟢 شراء CRYSTAL</button>
                <button class="trade-btn sell-btn" onclick="sellCrystal()">🔴 بيع CRYSTAL</button>
                <div style="margin-top: 15px; color: #aaa; font-size: 12px; text-align: center;">
                    💸 العمولة: 0.5% | 📊 سعر CRYSTAL يتغير مع BTC
                </div>
            </div>
        </div>

        <!-- P2P -->
        <div id="p2p-tab" class="tab-content">
            <div class="card">
                <h3 style="color:white">📊 سوق P2P المحلي</h3>
                <select id="p2pType" class="trade-input">
                    <option value="sell">🟢 عروض البيع</option>
                    <option value="buy">🔴 عروض الشراء</option>
                </select>
                <select id="p2pCurrency" class="trade-input">
                    <option value="USD">USD دولار أمريكي</option>
                    <option value="EUR">EUR يورو</option>
                    <option value="SAR">SAR ريال سعودي</option>
                    <option value="AED">AED درهم إماراتي</option>
                    <option value="EGP">EGP جنيه مصري</option>
                </select>
                <button class="trade-btn" onclick="loadP2POffers()">🔍 عرض العروض</button>
                <div id="p2pOffersList" style="margin-top: 15px;"><div class="loading">اختر نوع العرض</div></div>
                <button class="trade-btn" onclick="showCreateOffer()" style="background:#ff9800">➕ إنشاء عرض جديد</button>
            </div>
        </div>

        <!-- محفظتي -->
        <div id="wallet-tab" class="tab-content">
            <div class="card">
                <h3 style="color:white">💼 محفظتي</h3>
                <div id="walletInfo"><div class="loading">جاري التحميل...</div></div>
                <div style="margin-top: 15px;">
                    <h4 style="color:white">💰 سحب العملات</h4>
                    <select id="withdrawNetwork" class="trade-input">
                        <option value="bnb">BNB (BEP-20)</option>
                        <option value="polygon">POLYGON (MATIC)</option>
                        <option value="solana">SOLANA (SOL)</option>
                        <option value="aptos">APTOS (APT)</option>
                    </select>
                    <input type="number" id="withdrawAmount" placeholder="المبلغ" class="trade-input">
                    <input type="text" id="withdrawAddress" placeholder="عنوان المحفظة المستلم" class="trade-input">
                    <button class="trade-btn" onclick="withdraw()">💸 سحب</button>
                </div>
            </div>
        </div>

        <!-- متصدرين -->
        <div id="leaderboard-tab" class="tab-content">
            <div class="card">
                <h3 style="color:white">🏆 قائمة المتصدرين</h3>
                <div id="leaderboardList"><div class="loading">جاري التحميل...</div></div>
            </div>
        </div>

        <!-- الأسعار -->
        <div id="prices-tab" class="tab-content">
            <div class="card">
                <h3 style="color:white">📊 الأسعار الحالية</h3>
                <div id="pricesList"><div class="loading">جاري التحميل...</div></div>
                <div style="margin-top: 10px; font-size: 12px; color: #aaa; text-align: center;">
                    ⏰ تحديث كل دقيقة | 📊 الأسعار من Binance
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let currentLanguage = 'ar';
        const API_URL = window.location.origin;
        
        async function loadUserData() {
            try {
                const uid = tg.initDataUnsafe.user.id;
                const res = await fetch(`${API_URL}/api/user/stats/${uid}`);
                const data = await res.json();
                document.getElementById('crystalBalance').textContent = data.crystalBalance?.toFixed(2) || '0';
                document.getElementById('usdBalance').textContent = data.usdBalance?.toFixed(2) || '0';
                document.getElementById('crystalPrice').textContent = data.crystalPrice?.toFixed(6) || '0';
            } catch(e) { console.error(e); }
        }
        
        async function loadPrices() {
            try {
                const res = await fetch(`${API_URL}/api/prices`);
                const prices = await res.json();
                const liq = await fetch(`${API_URL}/api/liquidity`).then(r=>r.json());
                const container = document.getElementById('pricesList');
                container.innerHTML = `
                    <div class="price-row"><span>💎 CRYSTAL</span><span>${liq.price?.toFixed(6) || 0} USD</span></div>
                    <div class="price-row"><span>🟠 BTC</span><span>${prices.BTC?.price?.toFixed(2) || 0} USD (${prices.BTC?.change24h?.toFixed(2) || 0}%)</span></div>
                    <div class="price-row"><span>🔵 ETH</span><span>${prices.ETH?.price?.toFixed(2) || 0} USD</span></div>
                    <div class="price-row"><span>🟢 SOL</span><span>${prices.SOL?.price?.toFixed(2) || 0} USD</span></div>
                    <div class="price-row"><span>🟡 BNB</span><span>${prices.BNB?.price?.toFixed(2) || 0} USD</span></div>
                    <div class="price-row"><span>🟣 MATIC</span><span>${prices.MATIC?.price?.toFixed(2) || 0} USD</span></div>
                    <div class="price-row"><span>🔷 APT</span><span>${prices.APT?.price?.toFixed(2) || 0} USD</span></div>
                `;
            } catch(e) { console.error(e); }
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch(`${API_URL}/api/leaderboard`);
                const leaders = await res.json();
                const container = document.getElementById('leaderboardList');
                if(!leaders.length) { container.innerHTML = '<div class="loading">لا يوجد متصدرين</div>'; return; }
                container.innerHTML = leaders.map((l,i) => `
                    <div class="leader-item">
                        <span>${i===0?'👑':i===1?'🥈':i===2?'🥉':`#${i+1}`}</span>
                        <span>${l.name}</span>
                        <span>💎 ${l.balance?.toFixed(2) || 0}</span>
                        <span>💵 ${l.usd?.toFixed(2) || 0}</span>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        async function loadWallet() {
            try {
                const uid = tg.initDataUnsafe.user.id;
                const res = await fetch(`${API_URL}/api/wallet/${uid}`);
                const data = await res.json();
                document.getElementById('walletInfo').innerHTML = `
                    <div><strong>💰 USD:</strong> ${data.usdBalance?.toFixed(2) || 0}</div>
                    <div style="margin-top:10px"><strong>🟡 BNB:</strong><div class="address-box">${data.addresses.bnb}</div><button class="copy-btn" onclick="copyToClipboard('${data.addresses.bnb}')">📋 نسخ</button></div>
                    <div><strong>🟣 POLYGON:</strong><div class="address-box">${data.addresses.polygon}</div><button class="copy-btn" onclick="copyToClipboard('${data.addresses.polygon}')">📋 نسخ</button></div>
                    <div><strong>🟢 SOLANA:</strong><div class="address-box">${data.addresses.solana}</div><button class="copy-btn" onclick="copyToClipboard('${data.addresses.solana}')">📋 نسخ</button></div>
                    <div><strong>🔷 APTOS:</strong><div class="address-box">${data.addresses.aptos}</div><button class="copy-btn" onclick="copyToClipboard('${data.addresses.aptos}')">📋 نسخ</button></div>
                `;
            } catch(e) { console.error(e); }
        }
        
        async function buyCrystal() {
            const amount = document.getElementById('tradeAmount').value;
            if(!amount || amount<=0) return tg.showAlert('أدخل مبلغ صحيح');
            try {
                const res = await fetch(`${API_URL}/api/trade`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, type: 'buy', currency: 'CRYSTAL', amount: parseFloat(amount) })
                });
                const r = await res.json();
                tg.showAlert(r.message);
                if(r.success) loadUserData();
            } catch(e) { tg.showAlert('حدث خطأ'); }
        }
        
        async function sellCrystal() {
            const amount = document.getElementById('tradeAmount').value;
            if(!amount || amount<=0) return tg.showAlert('أدخل مبلغ صحيح');
            try {
                const res = await fetch(`${API_URL}/api/trade`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, type: 'sell', currency: 'CRYSTAL', amount: parseFloat(amount) })
                });
                const r = await res.json();
                tg.showAlert(r.message);
                if(r.success) loadUserData();
            } catch(e) { tg.showAlert('حدث خطأ'); }
        }
        
        async function loadP2POffers() {
            const type = document.getElementById('p2pType').value;
            const currency = document.getElementById('p2pCurrency').value;
            const res = await fetch(`${API_URL}/api/p2p/offers?type=${type}&currency=${currency}`);
            const offers = await res.json();
            const container = document.getElementById('p2pOffersList');
            if(!offers.length) { container.innerHTML = '<div class="loading">لا توجد عروض</div>'; return; }
            container.innerHTML = offers.map(o => `
                <div style="background:rgba(255,255,255,0.1); border-radius:12px; padding:12px; margin-bottom:10px">
                    <div><strong>👤 ${o.firstName || o.username}</strong></div>
                    <div>💎 ${o.crystalAmount?.toFixed(2) || 0} CRYSTAL</div>
                    <div>💰 ${o.fiatAmount} ${o.currency}</div>
                    <div>📊 ${o.pricePerCrystal?.toFixed(4) || 0} ${o.currency}/CRYSTAL</div>
                    <div>🏦 ${o.paymentMethod}</div>
                    <div>🆔 <code>${o._id}</code></div>
                    <button class="copy-btn" onclick="startTrade('${o._id}')">✅ بدء الصفقة</button>
                </div>
            `).join('');
        }
        
        async function startTrade(offerId) {
            const res = await fetch(`${API_URL}/api/p2p/start`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, offer_id: offerId })
            });
            const r = await res.json();
            tg.showAlert(r.message);
        }
        
        function showCreateOffer() {
            const type = prompt('نوع العرض (sell للبيع / buy للشراء):', 'sell');
            if(!type) return;
            const currency = prompt('العملة (USD, EUR, SAR, AED, EGP):', 'USD');
            if(!currency) return;
            const fiatAmount = prompt('المبلغ بالعملة المحلية:', '100');
            if(!fiatAmount) return;
            const crystalAmount = prompt('كمية CRYSTAL:', '10000');
            if(!crystalAmount) return;
            const paymentMethod = prompt('طريقة الدفع (بنكي, باي بال, فودافون كاش, إلخ):', 'بنكي');
            if(!paymentMethod) return;
            createOffer(type, currency, parseFloat(fiatAmount), parseFloat(crystalAmount), paymentMethod);
        }
        
        async function createOffer(type, currency, fiatAmount, crystalAmount, paymentMethod) {
            const res = await fetch(`${API_URL}/api/p2p/create`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, type, currency, fiatAmount, crystalAmount, paymentMethod, bankDetails: '' })
            });
            const r = await res.json();
            tg.showAlert(r.message);
        }
        
        async function withdraw() {
            const network = document.getElementById('withdrawNetwork').value;
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const address = document.getElementById('withdrawAddress').value;
            if(!amount || amount<=0) return tg.showAlert('أدخل مبلغ صحيح');
            if(!address) return tg.showAlert('أدخل عنوان المحفظة');
            const res = await fetch(`${API_URL}/api/withdraw`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, amount, currency: 'USDT', network, address })
            });
            const r = await res.json();
            tg.showAlert(r.message);
        }
        
        function copyToClipboard(text) { navigator.clipboard.writeText(text); tg.showAlert('✅ تم النسخ'); }
        
        function setLanguage(lang) { currentLanguage = lang; localStorage.setItem('language', lang); tg.showAlert(`✅ اللغة: ${lang === 'ar' ? 'العربية' : 'English'}`); }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
            if(tab === 'leaderboard') loadLeaderboard();
            if(tab === 'wallet') loadWallet();
            if(tab === 'prices') loadPrices();
        }
        
        registerUser();
        loadUserData();
        loadPrices();
        
        tg.MainButton.setText("🚀 فتح البوت");
        tg.MainButton.onClick(()=>tg.close());
        tg.MainButton.show();
    </script>
</body>
</html>
