<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>عملة رقمية - تداول في التلغرام</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma,sans-serif;}
body{background:#0b0f18;color:white;display:flex;justify-content:center;padding:20px;min-height:100vh;}
.phone{width:420px;background:linear-gradient(180deg,#161d2a,#0d121c);border-radius:25px;overflow:hidden;border:1px solid #2f3b52;box-shadow:0 0 30px rgba(255,0,0,.2);}
.header{padding:20px;text-align:center;font-size:24px;font-weight:bold;}
.network{background:#1b2333;padding:10px;text-align:center;font-size:13px;color:#ddd;}
.banner{padding:15px;}
.banner img{width:100%;border-radius:18px;border:2px solid #ff3b3b;display:block;}
.upload{padding:0 15px 15px;}
.upload input{width:100%;padding:10px;background:#202a3d;color:white;border:none;border-radius:10px;cursor:pointer;}
.content{padding:15px;}
.title{font-size:22px;text-align:center;margin-bottom:10px;}
.desc{text-align:center;color:#ccc;line-height:1.8;margin-bottom:15px;}
.stats{background:#182233;padding:12px;border-radius:15px;margin-bottom:15px;}
.stats div{margin:5px 0;}
.launch-btn{width:100%;padding:15px;border:none;border-radius:40px;font-size:18px;color:white;cursor:pointer;background:linear-gradient(180deg,#ff4b4b,#b50000);margin-bottom:15px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{background:linear-gradient(180deg,#2b3547,#1a2230);padding:14px;border-radius:14px;text-align:center;color:white;border:1px solid #39455c;cursor:pointer;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ff4b4b;padding:12px 20px;border-radius:30px;z-index:1000;animation:fadeOut 2s forwards;}
@keyframes fadeOut{0%{opacity:1;}100%{opacity:0;visibility:hidden;}}
</style>
</head>
<body>
<div class="phone">
<div class="header">🚀 اسم العملة</div>
<div class="network">Powered by Optimism Network (OP) | 🤖 يعمل في التلغرام</div>
<div class="banner"><img id="bannerImage" src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200" alt="Banner"></div>
<div class="upload"><input type="file" id="imageUpload" accept="image/*"></div>
<div class="content">
<div class="title">🚀 انطلق الآن</div>
<div class="desc">أهلاً بك في منصة التداول الرسمية.<br>تداول آمن ورسوم منخفضة وسرعة عالية.</div>
<div class="stats"><div>📈 السعر الحالي: $<span id="currentPrice">0.024</span></div><div>🔥 التغير: <span id="priceChange">+4.8%</span></div><div>⛽ الغاز: 0.1 Gwei</div></div>
<button class="launch-btn" id="tradeBtn">🚀 فتح منصة التداول</button>
<div class="grid">
<button class="btn" id="sellBtn">🔴 بيع العملة</button>
<button class="btn" id="buyBtn">🟢 شراء العملة</button>
<button class="btn" id="chartBtn">📊 الرسم البياني</button>
<button class="btn" id="walletBtn">💰 رصيدي ومحفظتي</button>
<button class="btn" id="communityBtn">👥 مجتمعنا</button>
<button class="btn" id="securityBtn">🔒 الأمان والتوثيق</button>
</div>
</div>
</div>
<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.MainButton.setText("✨ تداول الآن");
tg.MainButton.show();

const upload=document.getElementById("imageUpload"),banner=document.getElementById("bannerImage"),savedImage=localStorage.getItem("banner");if(savedImage)banner.src=savedImage;upload.addEventListener("change",function(e){const file=e.target.files[0];if(file){const reader=new FileReader();reader.onload=function(event){banner.src=event.target.result;localStorage.setItem("banner",event.target.result);showToast("✅ تم تغيير البانر!")};reader.readAsDataURL(file)}});

let currentPrice=0.024;function updatePrice(){fetch('/api/price').then(r=>r.json()).then(data=>{currentPrice=data.price;document.getElementById("currentPrice").innerText=currentPrice;const changePercent=((currentPrice-0.024)/0.024*100).toFixed(1),changeElement=document.getElementById("priceChange");if(parseFloat(changePercent)>=0){changeElement.innerHTML=`+${changePercent}% ↑`;changeElement.style.color="#4caf50"}else{changeElement.innerHTML=`${changePercent}% ↓`;changeElement.style.color="#ff4b4b"}}).catch(()=>{const change=(Math.random()*0.06)-0.03;let newPrice=currentPrice*(1+change);newPrice=Math.max(0.01,Math.min(0.05,newPrice));currentPrice=parseFloat(newPrice.toFixed(6));document.getElementById("currentPrice").innerText=currentPrice;const changePercent=((currentPrice-0.024)/0.024*100).toFixed(1),changeElement=document.getElementById("priceChange");if(parseFloat(changePercent)>=0){changeElement.innerHTML=`+${changePercent}% ↑`;changeElement.style.color="#4caf50"}else{changeElement.innerHTML=`${changePercent}% ↓`;changeElement.style.color="#ff4b4b"}})}setInterval(updatePrice,5000);updatePrice();

function showToast(message){const toast=document.createElement("div");toast.className="toast";toast.innerHTML=message;document.body.appendChild(toast);tg.HapticFeedback.impactOccurred("light");setTimeout(()=>toast.remove(),2000);}

document.getElementById("buyBtn").onclick=()=>{tg.showPopup({title:"🟢 شراء العملة",message:`السعر الحالي: $${currentPrice}\nأدخل المبلغ:`,type:"prompt",placeholder:"مثال: 100",buttons:[{type:"cancel",text:"إلغاء"},{type:"default",text:"شراء"}]},(btnId,input)=>{if(btnId==="default"&&input){const amount=parseFloat(input);if(amount>0){const coins=(amount/currentPrice).toFixed(4);tg.showPopup({title:"تأكيد الشراء",message:`ستشتري ${coins} عملة بمبلغ $${amount}`,buttons:[{type:"cancel",text:"لا"},{type:"default",text:"نعم"}]},(confirm)=>{if(confirm==="default"){showToast(`✅ تم شراء ${coins} عملة!`);tg.HapticFeedback.notificationOccurred("success")}})}}}})};

document.getElementById("sellBtn").onclick=()=>{tg.showPopup({title:"🔴 بيع العملة",message:`السعر الحالي: $${currentPrice}\nأدخل الكمية:`,type:"prompt",placeholder:"مثال: 100",buttons:[{type:"cancel",text:"إلغاء"},{type:"default",text:"بيع"}]},(btnId,input)=>{if(btnId==="default"&&input){const coins=parseFloat(input);if(coins>0){const value=(coins*currentPrice).toFixed(2);tg.showPopup({title:"تأكيد البيع",message:`ستبيع ${coins} عملة بمبلغ $${value}`,buttons:[{type:"cancel",text:"لا"},{type:"default",text:"نعم"}]},(confirm)=>{if(confirm==="default"){showToast(`✅ تم بيع ${coins} عملة!`);tg.HapticFeedback.notificationOccurred("success")}})}}}})};

document.getElementById("chartBtn").onclick=()=>{tg.showPopup({title:"📊 الرسم البياني",message:`السعر الحالي: $${currentPrice}\nأعلى سعر: $0.035\nأدنى سعر: $0.019`,buttons:[{type:"ok",text:"حسناً"}]})};

document.getElementById("walletBtn").onclick=()=>{tg.showPopup({title:"💰 محفظتي",message:"🔹 الرصيد النقدي: $1,250.50\n🔹 العملات: 5,432 MYC\n🔹 القيمة الإجمالية: $1,380.75",buttons:[{type:"ok",text:"إغلاق"}]})};

document.getElementById("communityBtn").onclick=()=>{tg.openTelegramLink("https://t.me/your_group");showToast("🚀 جارٍ فتح المجموعة...")};

document.getElementById("securityBtn").onclick=()=>{tg.showPopup({title:"🔒 الأمان",message:"✅ تم توثيق العقد الذكي\n✅ 95% من الأموال في محافظ باردة\n✅ حماية ثنائية",buttons:[{type:"ok",text:"حسناً"}]})};

document.getElementById("tradeBtn").onclick=()=>{tg.showPopup({title:"🚀 منصة التداول",message:"اختر ما تريد فعله:",buttons:[{type:"default",text:"شراء",id:"buy"},{type:"default",text:"بيع",id:"sell"},{type:"cancel",text:"إلغاء"}]},(btnId)=>{if(btnId==="buy")document.getElementById("buyBtn").click();else if(btnId==="sell")document.getElementById("sellBtn").click()})};

setTimeout(()=>{const user=tg.initDataUnsafe?.user;if(user)showToast(`✨ مرحباً ${user.first_name}!`);else showToast("✨ مرحباً بك في منصة التداول!");tg.HapticFeedback.impactOccurred("medium")},500);
</script>
</body>
</html>
