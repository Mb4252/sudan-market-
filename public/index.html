<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CRYSTAL Mining - تعدين الكريستال</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .balance-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-align: center;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }

        .mining-rate {
            font-size: 18px;
            opacity: 0.9;
        }

        .mine-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 20px 0;
        }

        .mine-button:active {
            transform: scale(0.95);
        }

        .mine-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timer {
            text-align: center;
            font-size: 20px;
            margin: 10px 0;
            color: #666;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .leaderboard {
            max-height: 400px;
            overflow-y: auto;
        }

        .leader-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .leader-rank {
            font-weight: bold;
            color: #667eea;
            width: 40px;
        }

        .leader-name {
            flex: 1;
            margin: 0 10px;
        }

        .leader-balance {
            font-weight: bold;
            color: #f5576c;
        }

        .buy-section {
            margin-top: 20px;
        }

        .buy-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin: 10px 0;
            direction: rtl;
        }

        .buy-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }

        .liquidity-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-button.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .reward-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: shake 0.5s;
        }

        .reward-amount {
            font-size: 36px;
            font-weight: bold;
            color: #f5576c;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card balance-card">
            <h2>💎 رصيد الكريستال</h2>
            <div class="balance-amount" id="balance">0</div>
            <div class="mining-rate">⚡ معدل التعدين: <span id="miningRate">1</span>x</div>
        </div>

        <div class="tab-buttons">
            <button class="tab-button active" onclick="switchTab('mine')">⛏️ تعدين</button>
            <button class="tab-button" onclick="switchTab('leaderboard')">🏆 متصدرين</button>
            <button class="tab-button" onclick="switchTab('buy')">💰 شراء</button>
        </div>

        <div id="mine-tab" class="tab-content active">
            <div class="card">
                <button class="mine-button" id="mineBtn" onclick="startMining()">
                    ⛏️ اضغط للتعدين
                </button>
                <div class="timer" id="timer"></div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">إجمالي المكدس</div>
                        <div class="stat-value" id="totalMined">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">مستوى التعدين</div>
                        <div class="stat-value" id="miningLevel">1</div>
                    </div>
                </div>

                <button class="buy-button" onclick="upgradeMining()" style="background: #ff9800; margin-top: 15px;">
                    ⚡ تطوير معدل التعدين
                </button>
            </div>
        </div>

        <div id="leaderboard-tab" class="tab-content">
            <div class="card">
                <h3>🏆 قائمة المتصدرين</h3>
                <div class="leaderboard" id="leaderboardList">
                    <div style="text-align: center; padding: 20px;">جاري التحميل...</div>
                </div>
            </div>
        </div>

        <div id="buy-tab" class="tab-content">
            <div class="card">
                <h3>💰 شراء CRYSTAL</h3>
                <div class="liquidity-info" id="liquidityInfo">
                    <div>💰 جاري تحميل معلومات السيولة...</div>
                </div>
                
                <div class="buy-section">
                    <input type="number" id="crystalAmount" placeholder="أدخل عدد الكريستال المطلوب" class="buy-input">
                    <button class="buy-button" onclick="initiatePurchase()">
                        💵 شراء بالـ USDT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let userData = {};
        let lastMiningTime = null;
        let miningInterval = null;
        
        // الحصول على عنوان الخادم
        const API_URL = window.location.origin;
        
        // تسجيل المستخدم
        async function registerUser() {
            try {
                await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: tg.initDataUnsafe.user.id,
                        username: tg.initDataUnsafe.user.username,
                        first_name: tg.initDataUnsafe.user.first_name
                    })
                });
            } catch (error) {
                console.error('Error registering user:', error);
            }
        }
        
        // تحميل بيانات المستخدم
        async function loadUserData() {
            try {
                const response = await fetch(`${API_URL}/api/user/${tg.initDataUnsafe.user.id}`);
                const data = await response.json();
                userData = data;
                updateUI();
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        // تحديث واجهة المستخدم
        function updateUI() {
            document.getElementById('balance').textContent = userData.balance?.toFixed(2) || '0';
            document.getElementById('miningRate').textContent = userData.miningRate || '1';
            document.getElementById('miningLevel').textContent = userData.miningLevel || '1';
            document.getElementById('totalMined').textContent = userData.totalMined?.toFixed(2) || '0';
            
            if (userData.lastMiningTime) {
                lastMiningTime = new Date(userData.lastMiningTime);
                updateTimer();
                if (miningInterval) clearInterval(miningInterval);
                miningInterval = setInterval(updateTimer, 1000);
            }
        }
        
        // تحديث المؤقت
        function updateTimer() {
            if (!lastMiningTime) return;
            
            const now = new Date();
            const diff = 3600000 - (now - lastMiningTime);
            
            if (diff <= 0) {
                document.getElementById('mineBtn').disabled = false;
                document.getElementById('timer').textContent = '✅ جاهز للتعدين!';
                if (miningInterval) clearInterval(miningInterval);
            } else {
                document.getElementById('mineBtn').disabled = true;
                const minutes = Math.floor(diff / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').textContent = `⏰ انتظر ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }
        
        // بدء التعدين
        async function startMining() {
            try {
                const response = await fetch(`${API_URL}/api/mine`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showReward(result.reward);
                    await loadUserData();
                    
                    lastMiningTime = new Date();
                    updateTimer();
                    if (miningInterval) clearInterval(miningInterval);
                    miningInterval = setInterval(updateTimer, 1000);
                    
                    tg.showAlert(`🎉 حصلت على ${result.reward} كريستال!`);
                } else if (result.remaining) {
                    const minutes = Math.floor(result.remaining / 60);
                    const seconds = Math.floor(result.remaining % 60);
                    tg.showAlert(`⏰ يجب الانتظار ${minutes}:${seconds.toString().padStart(2, '0')}`);
                }
            } catch (error) {
                console.error('Error mining:', error);
                tg.showAlert('حدث خطأ، حاول مرة أخرى');
            }
        }
        
        // عرض مكافأة التعدين
        function showReward(amount) {
            const popup = document.createElement('div');
            popup.className = 'reward-popup';
            popup.innerHTML = `
                <h2>🎉 مبروك!</h2>
                <div class="reward-amount">+${amount} CRYSTAL</div>
                <button onclick="this.parentElement.remove()">حسناً</button>
            `;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 3000);
        }
        
        // ترقية التعدين
        async function upgradeMining() {
            try {
                const response = await fetch(`${API_URL}/api/upgrade`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    await loadUserData();
                    tg.showAlert(result.message);
                } else {
                    tg.showAlert(result.message);
                }
            } catch (error) {
                console.error('Error upgrading:', error);
                tg.showAlert('حدث خطأ، حاول مرة أخرى');
            }
        }
        
        // تحميل لوحة المتصدرين
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_URL}/api/leaderboard`);
                const leaders = await response.json();
                
                const container = document.getElementById('leaderboardList');
                if (leaders.length === 0) {
                    container.innerHTML = '<div style="text-align: center;">لا يوجد متصدرين بعد</div>';
                    return;
                }
                
                container.innerHTML = leaders.map((leader, index) => `
                    <div class="leader-item">
                        <div class="leader-rank">#${index + 1}</div>
                        <div class="leader-name">${leader.name}</div>
                        <div class="leader-balance">${leader.balance.toFixed(2)} CRYSTAL</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading leaderboard:', error);
            }
        }
        
        // تحميل معلومات السيولة
        async function loadLiquidity() {
            try {
                const response = await fetch(`${API_URL}/api/liquidity`);
                const data = await response.json();
                
                const container = document.getElementById('liquidityInfo');
                const available = data.total_liquidity - data.total_sold;
                const soldPercent = ((data.total_sold / data.total_liquidity) * 100).toFixed(2);
                
                container.innerHTML = `
                    <div>💰 سعر العملة: 0.01 USDT لكل CRYSTAL</div>
                    <div>💎 إجمالي السيولة: ${data.total_liquidity.toFixed(2)} CRYSTAL</div>
                    <div>📊 السيولة المتاحة: ${available.toFixed(2)} CRYSTAL</div>
                    <div>💵 تم البيع: ${data.total_sold.toFixed(2)} CRYSTAL</div>
                    <div>📈 نسبة البيع: ${soldPercent}%</div>
                `;
            } catch (error) {
                console.error('Error loading liquidity:', error);
            }
        }
        
        // بدء عملية الشراء
        async function initiatePurchase() {
            const amount = document.getElementById('crystalAmount').value;
            if (!amount || amount <= 0) {
                tg.showAlert('الرجاء إدخال كمية صحيحة');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/purchase`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: tg.initDataUnsafe.user.id,
                        amount: parseFloat(amount)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    tg.showAlert(`
✅ تم إنشاء طلب الشراء!
💎 الكمية: ${result.crystal_amount} CRYSTAL
💰 المبلغ: ${result.usdt_amount} USDT
📤 ارسل المبلغ إلى: ${result.payment_address}

بعد التحويل أرسل /confirm ${result.transaction_id} [رابط المعاملة]
                    `);
                } else {
                    tg.showAlert(result.error);
                }
            } catch (error) {
                console.error('Error purchasing:', error);
                tg.showAlert('حدث خطأ، حاول مرة أخرى');
            }
        }
        
        // تبديل التبويبات
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
            
            if (tab === 'leaderboard') {
                loadLeaderboard();
            } else if (tab === 'buy') {
                loadLiquidity();
            }
        }
        
        // تهيئة التطبيق
        registerUser();
        loadUserData();
        loadLiquidity();
        
        tg.MainButton.setText("🚀 فتح البوت");
        tg.MainButton.onClick(() => {
            tg.close();
        });
        tg.MainButton.show();
    </script>
</body>
</html>
