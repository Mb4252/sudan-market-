<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔐 شهادة دفع - كريستال التعدين</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(165deg, #0b0e14, #1a1e2a);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .certificate-container {
            max-width: 1000px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1e2a, #0f131f);
            border: 3px solid #FFD700;
            border-radius: 40px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(255,215,0,0.2);
        }
        .certificate-container::before {
            content: '💎';
            position: absolute;
            font-size: 300px;
            opacity: 0.03;
            bottom: -50px;
            left: -50px;
            transform: rotate(-15deg);
        }
        .certificate-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px dashed #FFD700;
        }
        .certificate-title {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        .certificate-subtitle {
            font-size: 24px;
            color: #4facfe;
            font-weight: 700;
        }
        .certificate-badge {
            display: inline-block;
            background: linear-gradient(145deg, #4caf50, #2e7d32);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 800;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(76,175,80,0.3);
        }
        .certificate-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .certificate-section {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .section-title {
            color: #FFD700;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .info-label { color: #aaa; font-size: 15px; }
        .info-value { font-weight: 800; color: #fff; font-size: 16px; }
        .stars-value { color: #FFD700; font-size: 24px; font-weight: 900; }
        .crystals-value { color: #4facfe; font-size: 24px; font-weight: 900; }
        .signature-box {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            color: #4facfe;
            word-break: break-all;
            direction: ltr;
            text-align: left;
            border: 1px solid #4facfe;
        }
        .verification-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 3px dashed #FFD700;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            align-items: center;
        }
        .qrcode-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .verification-info {
            background: rgba(76,175,80,0.1);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #4caf50;
        }
        .verification-badge {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .verify-link {
            background: rgba(79,172,254,0.1);
            border: 1px solid #4facfe;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #4facfe;
            word-break: break-all;
            margin-top: 15px;
            direction: ltr;
            text-align: left;
        }
        .button {
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border: none;
            color: #0a0f1e;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 800;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,215,0,0.4); }
        .button-outline {
            background: transparent;
            border: 2px solid #FFD700;
            color: #FFD700;
        }
        .loading, .error {
            text-align: center;
            padding: 50px;
        }
        .error { color: #f44336; }
        .hidden { display: none; }
        @media (max-width: 768px) {
            .certificate-container { padding: 20px; }
            .certificate-title { font-size: 32px; }
            .certificate-content { grid-template-columns: 1fr; }
            .verification-section { grid-template-columns: 1fr; }
            .qrcode-container { order: 2; }
            .verification-info { order: 1; }
        }
    </style>
</head>
<body>
    <div class="certificate-container">
        <div id="loadingSpinner" class="loading">
            <div style="font-size: 64px; margin-bottom: 20px;">⏳</div>
            <div style="font-size: 20px;">جاري تحميل شهادة الدفع...</div>
        </div>
        <div id="errorMessage" class="error hidden">
            <div style="font-size: 64px; margin-bottom: 20px;">❌</div>
            <div style="font-size: 24px; color: #f44336; margin-bottom: 10px;">فشل تحميل الشهادة</div>
            <div id="errorText" style="color: #aaa; margin-bottom: 20px;"></div>
            <button class="button" onclick="window.close()">العودة</button>
        </div>
        <div id="certificateContent" class="hidden">
            <div class="certificate-header">
                <div class="certificate-title">💎 CRYSTAL MINING</div>
                <div class="certificate-subtitle">PAYMENT CERTIFICATE</div>
                <div class="certificate-badge" id="certificateId"></div>
            </div>
            <div class="certificate-content">
                <div class="certificate-section">
                    <div class="section-title"><span>📋</span> <span>معلومات المعاملة</span></div>
                    <div id="transactionInfo"></div>
                </div>
                <div class="certificate-section">
                    <div class="section-title"><span>👤</span> <span>معلومات المستخدم</span></div>
                    <div id="userInfo"></div>
                    <div class="signature-box">
                        <div style="color: #FFD700; margin-bottom: 10px;">🔐 التوقيع الرقمي HMAC-SHA256</div>
                        <div id="digitalSignature" style="font-size: 11px; line-height: 1.5;"></div>
                    </div>
                </div>
            </div>
            <div class="verification-section">
                <div class="qrcode-container" id="qrcode"></div>
                <div class="verification-info">
                    <div class="verification-badge">✅ موثقة وموقعة رقمياً</div>
                    <div style="font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 10px;" id="verificationStatus">شهادة صالحة</div>
                    <div style="color: #aaa; margin-bottom: 15px;" id="verificationDate"></div>
                    <div id="verificationCount" style="color: #4facfe; font-weight: 700; margin-bottom: 15px;"></div>
                    <div class="verify-link" id="verifyLink"></div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="button" onclick="downloadCertificate()">⬇️ تحميل الشهادة</button>
                        <button class="button button-outline" onclick="verifyCertificate()">🔄 تحقق</button>
                    </div>
                </div>
            </div>
            <div class="footer" style="margin-top: 40px; text-align: center; color: #aaa; font-size: 12px;">
                <p>شهادة دفع رسمية - بوت كريستال التعدين</p>
                <p style="margin-top: 5px;">موثقة بتوقيع رقمي HMAC-SHA256 - غير قابلة للتزوير</p>
            </div>
        </div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        let certData = null;
        tg.expand();
        tg.ready();

        async function loadCertificate() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return showError('معرف الشهادة غير موجود');
            try {
                const res = await fetch(`/api/receipt/${id}`, {
                    headers: { 'Authorization': `Telegram ${tg.initData}` }
                });
                const data = await res.json();
                if (data.success && data.receipt) {
                    certData = data.receipt;
                    renderCertificate(certData);
                } else showError(data.error || 'فشل تحميل الشهادة');
            } catch (e) {
                showError('خطأ في الاتصال');
            }
        }

        // ========== 🔐 دالة عرض الشهادة - محمية ضد XSS ==========
        function renderCertificate(r) {
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('certificateContent').classList.remove('hidden');
            
            // 🛡️ استخدام textContent لجميع أسماء المستخدمين
            const certificateIdEl = document.getElementById('certificateId');
            certificateIdEl.textContent = `🆔 ${r.certificate_id || 'CERT-' + r.transaction_id.substring(0,8)}`;
            
            const d = new Date(r.date).toLocaleDateString('ar-EG', { dateStyle: 'full', timeStyle: 'medium' });
            
            // إنشاء HTML بأمان - الأسماء تأتي من textContent
            const transactionHtml = `
                <div class="info-row">
                    <span class="info-label">رقم المعاملة:</span>
                    <span class="info-value" style="font-family:monospace; color:#4facfe; font-size:12px; direction:ltr;">${r.transaction_id}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">التاريخ:</span>
                    <span class="info-value">${d}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">النجوم المدفوعة:</span>
                    <span class="stars-value">${r.stars_paid} ⭐</span>
                </div>
                <div class="info-row">
                    <span class="info-label">الكريستال:</span>
                    <span class="crystals-value">${r.crystals_received.toFixed(1)} 💎</span>
                </div>
                <div class="info-row">
                    <span class="info-label">سعر الصرف:</span>
                    <span class="info-value">${r.rate}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">الحالة:</span>
                    <span class="info-value" style="color:#4caf50;">✅ ${r.status}</span>
                </div>
            `;
            document.getElementById('transactionInfo').innerHTML = transactionHtml;
            
            // 🛡️ استخدام textContent لاسم المستخدم
            const userInfoDiv = document.getElementById('userInfo');
            userInfoDiv.innerHTML = `
                <div class="info-row">
                    <span class="info-label">المستخدم:</span>
                    <span class="info-value" id="safeUserName"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">المعرف:</span>
                    <span class="info-value" style="font-family:monospace; color:#4facfe;">${r.user_id}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">جهة الإصدار:</span>
                    <span class="info-value">@${r.bot_username}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">التحقق:</span>
                    <span class="info-value" style="color:#4caf50;">${r.verified_by}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">الإصدار:</span>
                    <span class="info-value">v${r.certificate_version||'2.0'}</span>
                </div>
            `;
            
            // 🛡️ إضافة اسم المستخدم بأمان
            const safeNameSpan = document.createElement('span');
            safeNameSpan.style.fontWeight = '800';
            safeNameSpan.style.color = '#fff';
            safeNameSpan.style.fontSize = '16px';
            safeNameSpan.textContent = r.user_name;
            document.getElementById('safeUserName').appendChild(safeNameSpan);
            
            // 🛡️ التوقيع الرقمي (نص عادي، آمن)
            const signature = r.signature.match(/.{1,32}/g)?.join('\n') || r.signature;
            document.getElementById('digitalSignature').textContent = signature;
            
            // تواريخ آمنة
            document.getElementById('verificationDate').innerHTML = `تاريخ الإصدار: ${new Date(r.issued_at||r.date).toLocaleDateString('ar-EG')}`;
            document.getElementById('verificationCount').innerHTML = `🔄 عدد مرات التحقق: ${r.verification_count||1}`;
            document.getElementById('verifyLink').innerHTML = r.verify_link;
            
            // QR Code
            new QRCode(document.getElementById('qrcode'), {
                text: r.verify_link,
                width: 180,
                height: 180,
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function showError(msg) {
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('errorText').innerHTML = msg;
        }

        async function downloadCertificate() {
            if (!certData) return;
            try {
                const res = await fetch(`/api/receipt/${certData.transaction_id}`, {
                    headers: { 'Authorization': `Telegram ${tg.initData}` }
                });
                const data = await res.json();
                if (data.success && data.receipt) {
                    const r = data.receipt;
                    const sig = r.signature.match(/.{1,64}/g)?.join('\n') || r.signature;
                    const text = `═══════════════════════════════════════\n💎 كريستال التعدين - شهادة دفع رسمية\n═══════════════════════════════════════\n\n🆔 رقم الشهادة: ${r.certificate_id}\n📅 التاريخ: ${new Date().toLocaleDateString('ar-EG')}\n\n📄 المعاملة: ${r.transaction_id}\n📅 تاريخ الدفع: ${new Date(r.date).toLocaleString('ar-EG')}\n⭐ النجوم: ${r.stars_paid}\n💎 الكريستال: ${r.crystals_received.toFixed(1)}\n📊 السعر: ${r.rate}\n\n👤 المستخدم: ${r.user_name}\n🆔 المعرف: ${r.user_id}\n\n🔐 التوقيع الرقمي (HMAC-SHA256):\n${sig}\n\n🔗 التحقق: ${r.verify_link}\n\n═══════════════════════════════════════\n✅ شهادة موثقة - غير قابلة للتزوير\n✅ بوت كريستال التعدين - @${r.bot_username}\n═══════════════════════════════════════`;
                    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `CERT_${r.certificate_id || r.transaction_id.substring(0,8)}.txt`;
                    a.click();
                    URL.revokeObjectURL(url);
                    tg.showAlert('✅ تم تحميل الشهادة');
                }
            } catch (e) { 
                tg.showAlert('❌ فشل التحميل'); 
            }
        }

        async function verifyCertificate() {
            if (!certData) return;
            const res = await fetch(`/api/verify-certificate/${certData.transaction_id}`);
            const data = await res.json();
            if (data.success && data.verification) {
                const v = data.verification;
                tg.showAlert(v.valid ? `✅ الشهادة صالحة ✓\n🔄 تم التحقق ${v.verificationCount} مرة\n🔐 التوقيع: صحيح` : `❌ الشهادة غير صالحة!`);
                document.getElementById('verificationCount').innerHTML = `🔄 عدد مرات التحقق: ${v.verificationCount}`;
            }
        }

        loadCertificate();
        window.downloadCertificate = downloadCertificate;
        window.verifyCertificate = verifyCertificate;
    </script>
</body>
</html>
