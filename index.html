<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العقل العلمي الخارق | الإصدار الشامل</title>
    
    <!-- الخطوط والمكتبات -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --neon-blue: #00f5ff;
            --neon-purple: #9d4edd;
            --bg: #050510;
            --glass: rgba(255, 255, 255, 0.08);
            --grad: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; }

        /* شاشات النظام */
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.5s; }
        .screen.active { display: flex; opacity: 1; }

        /* شاشة التحميل */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .spinner { 
            width: 80px; height: 80px; border: 5px solid var(--glass); 
            border-top-color: var(--neon-blue); border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }

        /* شاشة الدخول الزجاجية */
        .auth-card {
            background: var(--glass); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(0, 245, 255, 0.3); backdrop-filter: blur(20px);
            width: 90%; max-width: 400px; text-align: center;
        }

        .auth-card input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
            color: white; outline: none;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--grad); color: white; font-weight: 800;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        /* الواجهة الرئيسية */
        .app-container { width: 100%; height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
        header { padding: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; }
        .chat-box { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 15px; max-width: 85%; line-height: 1.6; animation: slideUp 0.3s ease; }
        .ai-msg { align-self: flex-start; background: rgba(157, 78, 221, 0.1); border: 1px solid var(--neon-purple); }
        .user-msg { align-self: flex-end; background: rgba(0, 245, 255, 0.1); border: 1px solid var(--neon-blue); }
        .input-area { padding: 20px; background: rgba(0,0,0,0.3); display: flex; gap: 10px; }
        #user-input { flex: 1; background: var(--glass); border: 1px solid var(--glass); border-radius: 10px; color: white; padding: 12px; outline: none; resize: none; }
        .send-btn { width: 50px; background: var(--grad); border: none; border-radius: 10px; color: white; cursor: pointer; }
        .badge { font-size: 10px; background: var(--neon-blue); color: black; padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="loader">
        <div class="spinner"></div>
        <h2 style="margin-top: 20px; font-family: 'Orbitron'; color: var(--neon-blue); letter-spacing: 5px;">CORE LOADING</h2>
    </div>

    <!-- شاشة الدخول -->
    <div id="login-screen" class="screen">
        <div class="auth-card">
            <i class="fas fa-atom" style="font-size: 50px; color: var(--neon-blue); margin-bottom: 20px;"></i>
            <h2 style="font-family: 'Orbitron';">SCIENTIFIC AI</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn" onclick="App.login()">تسجيل الدخول</button>
            <button class="btn" style="background: var(--glass); border: 1px solid var(--neon-blue);" onclick="App.guest()">الدخول كضيف</button>
        </div>
    </div>

    <!-- شاشة التطبيق الرئيسية -->
    <div id="app-screen" class="screen">
        <div class="app-container">
            <header>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fas fa-brain" style="color: var(--neon-blue); font-size: 24px;"></i>
                    <div>
                        <h4 style="margin: 0; font-family: 'Orbitron'; font-size: 14px;">MASTER CORE</h4>
                        <small id="status" style="color: var(--neon-blue); font-size: 9px;">● متصل بالنظام</small>
                    </div>
                </div>
                <button onclick="App.logout()" style="background:none; border:none; color:#ff4757; cursor:pointer; font-size: 18px;"><i class="fas fa-power-off"></i></button>
            </header>
            
            <div class="chat-box" id="chat"></div>

            <div class="input-area">
                <textarea id="user-input" placeholder="اكتب مسألتك هنا..." rows="1"></textarea>
                <button class="send-btn" onclick="App.sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // تكوين Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAI_mUhuPNoO-XC0Q-VNoWft8UWFbAbIGg",
            authDomain: "sudan-market-6b122.firebaseapp.com",
            databaseURL: "https://sudan-market-6b122-default-rtdb.firebaseio.com",
            projectId: "sudan-market-6b122",
            storageBucket: "sudan-market-6b122.appspot.com",
            messagingSenderId: "66729481566",
            appId: "1:66729481566:web:93393f28dc22d32cceebcf"
        };

        // تهيئة Firebase بأمان
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.database();

        const App = {
            user: null,

            init() {
                // مراقبة حالة تسجيل الدخول
                auth.onAuthStateChanged(user => {
                    this.hideLoader();
                    if (user) {
                        this.user = user;
                        this.showScreen('app-screen');
                        this.loadHistory();
                    } else {
                        this.showScreen('login-screen');
                    }
                });

                // أمان: إذا فشل تحميل Firebase أو تأخر، أغلق شاشة التحميل بعد 5 ثوانٍ
                setTimeout(() => this.hideLoader(), 5000);
            },

            hideLoader() {
                const loader = document.getElementById('loader');
                if(loader) loader.style.display = 'none';
            },

            showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },

            async login() {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                if(!e || !p) return alert("يرجى ملء البيانات");
                try { 
                    await auth.signInWithEmailAndPassword(e, p); 
                } catch (err) { 
                    alert("خطأ: " + err.message); 
                }
            },

            guest() {
                this.user = { uid: "guest", email: "ضيف" };
                this.hideLoader();
                this.showScreen('app-screen');
                this.appendMsg("تم تفعيل وضع الضيف (بدون حفظ سحابي).", "ai");
            },

            logout() { 
                auth.signOut().then(() => location.reload()); 
            },

            sendMessage() {
                const input = document.getElementById('user-input');
                const text = input.value.trim();
                if (!text) return;

                this.appendMsg(text, 'user');
                input.value = '';

                const answer = Brain.solve(text);
                setTimeout(() => {
                    this.appendMsg(answer, 'ai');
                    this.saveToDB(text, answer);
                }, 600);
            },

            appendMsg(text, type) {
                const chat = document.getElementById('chat');
                const div = document.createElement('div');
                div.className = `msg ${type}-msg`;
                div.innerHTML = (type === 'ai' ? `<span class="badge">التحليل العلمي</span><br>` : '') + text.replace(/\n/g, '<br>');
                chat.appendChild(div);
                chat.scrollTop = chat.scrollHeight;
            },

            saveToDB(q, a) {
                if (this.user && this.user.uid !== "guest") {
                    db.ref('chats/' + this.user.uid).push({ q, a, t: Date.now() });
                }
            },

            loadHistory() {
                if (!this.user || this.user.uid === "guest") return;
                db.ref('chats/' + this.user.uid).limitToLast(10).once('value', snap => {
                    snap.forEach(child => {
                        const data = child.val();
                        this.appendMsg(data.q, 'user');
                        this.appendMsg(data.a, 'ai');
                    });
                });
            }
        };

        const Brain = {
            periodicTable: {
                "هيدروجين": 1.008, "كربون": 12.011, "أكسجين": 15.999, "صوديوم": 22.99, "حديد": 55.845
            },
            solve(query) {
                const nums = (query.match(/\d+(\.\d+)?/g) || []).map(Number);
                
                if (query.includes("مول") || query.includes("جرام")) {
                    for (let el in this.periodicTable) {
                        if (query.includes(el)) {
                            const mass = nums[0] || 0;
                            const res = mass / this.periodicTable[el];
                            return `🧪 **كيمياء:** عدد مولات ${el} في ${mass} جرام هو **${res.toFixed(3)} مول**.`;
                        }
                    }
                }

                if (query.includes("قوة") || query.includes("تسارع")) {
                    if (nums.length >= 2) return `⚙️ **فيزياء:** القوة (F=ma) تساوي **${(nums[0]*nums[1]).toFixed(2)} نيوتن**.`;
                }

                try {
                    const mathRes = math.evaluate(query.replace(/[أ-ي]/g, ''));
                    if (mathRes !== undefined) return `📐 **رياضيات:** الناتج هو **${mathRes}**`;
                } catch(e) {}

                return "لم أفهم المسألة تماماً. حاول كتابة الأرقام والنوع (كيمياء/فيزياء).";
            }
        };

        // بدء التشغيل
        window.onload = () => App.init();

        // إرسال بالضغط على Enter
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                App.sendMessage();
            }
        });
    </script>
</body>
</html>
