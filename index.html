<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI | العقل العلمي الخارق</title>
    
    <!-- مكتبات المعالجة الرياضية والعلمية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <!-- إضافة مكتبة Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-magenta: #ff00ff;
            --deep-space: #020205;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(0, 245, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--deep-space);
            color: #e0e0e0;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        /* تأثير الخلفية المتحركة (الشبكة العصبية) */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .app-wrapper {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            border-left: 1px solid var(--border-glow);
            border-right: 1px solid var(--border-glow);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--border-glow);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0; font-size: 1.5rem;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .chat-container {
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid var(--neon-cyan);
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-magenta);
            border-bottom-left-radius: 2px;
        }

        .ai-msg::before {
            content: 'CORE ANALYSIS';
            display: block;
            font-size: 0.7rem;
            color: var(--neon-magenta);
            margin-bottom: 8px;
            font-family: 'Orbitron';
        }

        .input-box {
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #user-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--border-glow); }

        .send-btn {
            background: var(--neon-cyan);
            border: none;
            border-radius: 12px;
            width: 55px;
            cursor: pointer;
            color: black;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* تجميل المعادلات */
        .math-res {
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }
        
        /* تخصيص للإشعارات */
        .storage-notification {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="app-wrapper">
        <header>
            <h1>QUANTUM CORE v7.0</h1>
            <small style="color: #666;">نظام الاستدلال العلمي والمنطقي المتقدم</small>
        </header>

        <div class="chat-container" id="chat">
            <div class="message ai-msg">
                مرحباً بك في النواة المركزية. أنا الآن جاهز لحل أعقد المسائل في الفيزياء، الكيمياء، والرياضيات. لقد تم تطوير منطقي ليفهم الخدع والأسئلة السياقية. كيف يمكنني مساعدتك؟
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="user-input" placeholder="اكتب المسألة هنا (مثلاً: حل معادلة x^2 + 5x + 6 = 0)..." autocomplete="off">
            <button class="send-btn" onclick="processInput()"><i class="fas fa-microchip"></i></button>
        </div>
    </div>

    <script>
        // ========== إضافة: تهيئة Firebase ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAI_mUhuPNoO-XC0Q-VNoWft8UWFbAbIGg",
            authDomain: "sudan-market-6b122.firebaseapp.com",
            databaseURL: "https://sudan-market-6b122-default-rtdb.firebaseio.com",
            projectId: "sudan-market-6b122",
            storageBucket: "sudan-market-6b122.firebasestorage.app",
            messagingSenderId: "66729481566",
            appId: "1:66729481566:web:93393f28dc22d32cceebcf"
        };
        
        // تهيئة Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // الذاكرة البسيطة - مضافة فقط
        const SimpleMemory = {
            memory: {},
            
            add(key, value) {
                this.memory[key] = value;
                return `تم حفظ "${key}" في الذاكرة`;
            },
            
            find(query) {
                return this.memory[query];
            }
        };

        // ========== إضافة: نظام التخزين المزدوج ==========
        const StorageSystem = {
            // حفظ قانون/قاعدة في Firebase (القواعد العلمية)
            async saveLaw(lawName, lawContent) {
                try {
                    await database.ref('laws/' + lawName.replace(/\s+/g, '_')).set({
                        content: lawContent,
                        type: 'law',
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        created: new Date().toISOString()
                    });
                    return `📚 تم حفظ القانون "${lawName}" في قاعدة البيانات الدائمة`;
                } catch (error) {
                    console.error("خطأ في حفظ القانون:", error);
                    return "❌ حدث خطأ أثناء حفظ القانون في قاعدة البيانات";
                }
            },
            
            // استرجاع قانون من Firebase
            async getLaw(lawName) {
                try {
                    const snapshot = await database.ref('laws/' + lawName.replace(/\s+/g, '_')).once('value');
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        return `📖 القانون: ${lawName}\n📝 المحتوى: ${data.content}\n🕐 تم الحفظ في: ${new Date(data.created).toLocaleString('ar-SA')}`;
                    }
                    return null;
                } catch (error) {
                    console.error("خطأ في استرجاع القانون:", error);
                    return null;
                }
            },
            
            // حفظ محادثة في LocalStorage (المتصفح)
            saveChatInBrowser(userQuery, aiResponse) {
                try {
                    // إنشاء كائن المحادثة
                    const chatRecord = {
                        user: userQuery,
                        ai: aiResponse,
                        timestamp: new Date().toISOString(),
                        date: new Date().toLocaleString('ar-SA')
                    };
                    
                    // استرجاع المحادثات القديمة
                    let allChats = localStorage.getItem('quantum_ai_chats');
                    if (!allChats) {
                        allChats = [];
                    } else {
                        allChats = JSON.parse(allChats);
                    }
                    
                    // إضافة المحادثة الجديدة
                    allChats.push(chatRecord);
                    
                    // حفظ فقط آخر 50 محادثة
                    if (allChats.length > 50) {
                        allChats = allChats.slice(-50);
                    }
                    
                    // الحفظ في LocalStorage
                    localStorage.setItem('quantum_ai_chats', JSON.stringify(allChats));
                    
                    return true;
                } catch (error) {
                    console.error("خطأ في حفظ المحادثة:", error);
                    return false;
                }
            },
            
            // استرجاع جميع المحادثات من المتصفح
            getAllChatsFromBrowser() {
                try {
                    const chats = localStorage.getItem('quantum_ai_chats');
                    if (!chats) return [];
                    return JSON.parse(chats);
                } catch (error) {
                    return [];
                }
            }
        };

        // محرك الاستدلال العلمي المتقدم - مع إصلاح دالة الفيزياء فقط
        const ScientificAI = {
            constants: {
                g: 9.80665, // الجاذبية
                R: 8.314,   // ثابت الغازات
                c: 299792458, // سرعة الضوء
                h: 6.626e-34 // ثابت بلانك
            },

            // تحليل السياق وفهم النوع (رياضيات، كيمياء، فيزياء، منطق)
            analyze(input) {
                input = input.toLowerCase();
                
                // 1. التحقق من وجود أمر "احفظ" و "جواب"
                if (input.includes('احفظ') && input.includes('جواب')) {
                    return this.saveMemory(input);
                }
                
                // ========== إضافة: اكتشاف وحفظ القوانين ==========
                // إذا كان المستخدم يريد حفظ قانون (يحتوي على كلمات مثل قانون، قاعدة، نظرية، معادلة)
                if (input.includes('احفظ قانون') || input.includes('اضف قانون') || 
                    input.includes('احفظ قاعدة') || input.includes('اضف نظرية')) {
                    return this.saveScientificLaw(input);
                }
                
                // ========== إضافة: البحث عن قانون في قاعدة البيانات ==========
                if (input.includes('قانون ') || input.includes('نظرية ') || 
                    input.includes('قاعدة ') || input.includes('استرجع قانون')) {
                    const lawName = this.extractLawName(input);
                    if (lawName) {
                        const lawResult = StorageSystem.getLaw(lawName);
                        if (lawResult) return lawResult;
                    }
                }
                
                // 2. البحث في الذاكرة أولاً
                const memoryResult = SimpleMemory.find(input);
                if (memoryResult) {
                    // ========== إضافة: حفظ المحادثة العادية في المتصفح ==========
                    StorageSystem.saveChatInBrowser(input, memoryResult);
                    return memoryResult; // إجابة مختصرة مباشرة
                }
                
                // 3. التعامل مع المعادلات الرياضية المعقدة
                if (/[0-9]/.test(input) && (input.includes('=') || input.includes('^') || input.includes('sqrt') || input.includes('x'))) {
                    const mathResult = this.solveMath(input);
                    // ========== إضافة: حفظ المحادثة العادية في المتصفح ==========
                    StorageSystem.saveChatInBrowser(input, mathResult);
                    return mathResult;
                }

                // 4. تحليل المسائل الفيزيائية (السرعة، القوة، الطاقة)
                if (input.includes('سرعة') || input.includes('زمن') || input.includes('قوة') || input.includes('جول')) {
                    const physicsResult = this.solvePhysics(input);
                    // ========== إضافة: حفظ المحادثة العادية في المتصفح ==========
                    StorageSystem.saveChatInBrowser(input, physicsResult);
                    return physicsResult;
                }

                // 5. الكيمياء والكتلة المولية
                if (input.includes('كتلة') || input.includes('مول') || input.includes('عنصر')) {
                    const chemistryResult = this.solveChemistry(input);
                    // ========== إضافة: حفظ المحادثة العادية في المتصفح ==========
                    StorageSystem.saveChatInBrowser(input, chemistryResult);
                    return chemistryResult;
                }

                // 6. إذا كان سؤالاً ذكياً أو مخادعاً
                const logicResult = this.logicalReasoning(input);
                // ========== إضافة: حفظ المحادثة العادية في المتصفح ==========
                StorageSystem.saveChatInBrowser(input, logicResult);
                return logicResult;
            },

            // ========== إضافة: دالة لحفظ القوانين العلمية في Firebase ==========
            async saveScientificLaw(input) {
                try {
                    // استخراج اسم القانون ومحتواه
                    const lawMatch = input.match(/احفظ (قانون|قاعدة|نظرية) (.+?) كـ (.+)/i) || 
                                     input.match(/اضف (قانون|قاعدة|نظرية) (.+?) وهي (.+)/i);
                    
                    if (lawMatch) {
                        const lawName = lawMatch[2].trim();
                        const lawContent = lawMatch[3].trim();
                        
                        const result = await StorageSystem.saveLaw(lawName, lawContent);
                        return result + "<div class='storage-notification'>💾 تم الحفظ في قاعدة البيانات الدائمة (Firebase)</div>";
                    } else {
                        return "📝 صيغة غير صحيحة. استخدم: 'احفظ قانون [اسم القانون] كـ [محتوى القانون]'";
                    }
                } catch (error) {
                    return "❌ حدث خطأ أثناء حفظ القانون في قاعدة البيانات";
                }
            },
            
            // ========== إضافة: دالة لاستخراج اسم القانون ==========
            extractLawName(input) {
                const matches = input.match(/قانون (.+?)(?=\s|$)/) || 
                                input.match(/نظرية (.+?)(?=\s|$)/) || 
                                input.match(/قاعدة (.+?)(?=\s|$)/);
                return matches ? matches[1].trim() : null;
            },

            // حفظ في الذاكرة باستخدام "احفظ" و "جواب"
            saveMemory(input) {
                try {
                    // استخراج السؤال والجواب من النص
                    const parts = input.split('جواب');
                    if (parts.length < 2) return "صيغة غير صحيحة. استخدم: احفظ [السؤال] جواب [الإجابة]";
                    
                    const questionPart = parts[0].replace('احفظ', '').trim();
                    const answerPart = parts[1].trim();
                    
                    if (!questionPart || !answerPart) {
                        return "يجب أن تحتوي على سؤال وجواب";
                    }
                    
                    const result = SimpleMemory.add(questionPart, answerPart);
                    return result;
                } catch (e) {
                    return "خطأ في حفظ الذاكرة. تأكد من الصيغة: احفظ [السؤال] جواب [الإجابة]";
                }
            },

            solveMath(q) {
                try {
                    // تنظيف النص لاستخراج المعادلة فقط
                    let equation = q.replace(/حل|المعادلة|أوجد|قيمة/g, '').replace(/=/g, '-(') + ')';
                    if (!q.includes('=')) equation = q.replace(/أحسب|ما هو|ناتج/g, '');

                    const result = math.evaluate(equation);
                    return `📝 **التحليل الرياضي:**<br>المسألة المعالجة: \`${q}\`<br><span class="math-res">الناتج النهائي: ${result}</span>`;
                } catch (e) {
                    try {
                        // محاولة ثانية لحل المعادلات الجبرية
                        const simplified = math.simplify(q.split('=')[0]).toString();
                        return `📝 **تبسيط جبري:**<br>التعبير المبسط هو: <span class="math-res">${simplified}</span>`;
                    } catch (err) {
                        return "يبدو أن المعادلة معقدة برمجياً. تأكد من كتابة الرموز بشكل صحيح مثل (x^2) بدلاً من (س تربيع).";
                    }
                }
            },

            // دالة الفيزياء المصلحة
            solvePhysics(q) {
                const nums = q.match(/\d+(\.\d+)?/g)?.map(Number) || [];
                
                // 1. مسائل السرعة - الإصلاح هنا: استخدم القسمة بدلاً من الضرب
                if (q.includes('سرعة') && nums.length >= 2) {
                    // الإصلاح: السرعة = المسافة ÷ الزمن (القسمة، ليس الضرب)
                    const speed = nums[0] / nums[1];
                    return `🚀 **حل مسألة السرعة:**<br>
                    القانون: <strong>السرعة = المسافة ÷ الزمن</strong><br>
                    الحساب: ${nums[0]} متر ÷ ${nums[1]} ثانية<br>
                    <span class="math-res">السرعة = ${speed.toFixed(2)} متر/ثانية</span><br>
                    <small>(${(speed * 3.6).toFixed(2)} كم/ساعة تقريباً)</small>`;
                }

                // 2. مسائل القوة - هذا صحيح (القوة = الكتلة × التسارع)
                if (q.includes('قوة') && nums.length >= 2) {
                    const force = nums[0] * nums[1];
                    return `⚡ **حل مسألة القوة:**<br>
                    القانون: <strong>القوة = الكتلة × التسارع</strong> (F = m × a)<br>
                    الحساب: ${nums[0]} × ${nums[1]}<br>
                    <span class="math-res">القوة = ${force} نيوتن</span>`;
                }

                // 3. مسائل الطاقة
                if (q.includes('طاقة') || q.includes('جول')) {
                    if (nums.length >= 2) {
                        const energy = nums[0] * nums[1];
                        return `⚡ **حل مسألة الطاقة:**<br>
                        القانون: <strong>الطاقة = القدرة × الزمن</strong><br>
                        الحساب: ${nums[0]} × ${nums[1]}<br>
                        <span class="math-res">الطاقة = ${energy} جول</span>`;
                    }
                }

                // 4. مسائل التسارع
                if (q.includes('تسارع') && nums.length >= 2) {
                    const acceleration = (nums[1] - nums[0]) / (nums[2] || 1); // افتراض زمن = 1 إذا لم يعط
                    return `⚡ **حل مسألة التسارع:**<br>
                    القانون: <strong>التسارع = (السرعة النهائية - السرعة الابتدائية) ÷ الزمن</strong><br>
                    <span class="math-res">التسارع ≈ ${acceleration.toFixed(2)} متر/ثانية²</span>`;
                }

                return "لقد رصدت مسألة فيزياء. يرجى تزويدي بالمعطيات (الأرقام والوحدات) لأقوم بتطبيق القانون المناسب (نيوتن، أينشتاين، أو قوانين الحركة).";
            },

            solveChemistry(q) {
                // محاكاة قاعدة بيانات لبعض العناصر
                const elements = {"هيدروجين": 1.008, "أكسجين": 16, "كربون": 12.01, "نيتروجين": 14.01};
                for (let el in elements) {
                    if (q.includes(el)) {
                        return `🧪 **تحليل كيميائي:**<br>العنصر: ${el}<br>الكتلة الذرية: ${elements[el]} g/mol.<br>إذا أعطيتني الكتلة بالجرام، يمكنني حساب المولات فوراً.`;
                    }
                }
                return "كيمياء: يرجى كتابة الصيغة الكيميائية (مثال: H2O) أو اسم العنصر بوضوح.";
            },

            logicalReasoning(q) {
                // هنا يتم التعامل مع الأسئلة المخادعة
                const tricks = {
                    "أيهما أثقل كيلو حديد أم كيلو قطن": "كلاهما متساويان في الكتلة (1 كيلو جرام)، ولكن الفرق في الحجم والكثافة.",
                    "من هو مخترع": "يرجى تحديد الاختراع الذي تقصده لأعطيك تفاصيل دقيقة عن العالم المخترع.",
                    "كم يساوي": "يرجى إدخال أرقام محددة لإجراء العملية الحسابية."
                };

                for (let key in tricks) {
                    if (q.includes(key)) return `🧠 **تحليل منطقي:**<br>${tricks[key]}`;
                }

                return "أنا أفهم سياقك. كوني عقلاً علمياً، أحتاج لمعطيات أكثر دقيقة للإجابة على هذا السؤال بشكل لا يحتمل الخطأ.";
            }
        };

        // وظائف الواجهة - الأصلية تماماً
        function appendMsg(text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function processInput() {
            const inputField = document.getElementById('user-input');
            const query = inputField.value.trim();
            if (!query) return;

            appendMsg(query, 'user');
            inputField.value = '';

            // محاكاة تفكير النواة
            setTimeout(async () => {
                const response = await ScientificAI.analyze(query);
                appendMsg(response, 'ai');
            }, 600);
        }

        // تحسين الإدخال - الأصلية
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processInput();
        });

        // تأثير خلفية Matrix/Neural - الأصلية
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawBg() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f5ff11';
            for(let i=0; i<20; i++) {
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
            requestAnimationFrame(drawBg);
        }
        drawBg();
        
        // ========== إضافة: إظهار عدد المحادثات المحفوظة عند التحميل ==========
        window.addEventListener('load', () => {
            const savedChats = StorageSystem.getAllChatsFromBrowser();
            if (savedChats.length > 0) {
                setTimeout(() => {
                    appendMsg(`💾 تم تحميل ${savedChats.length} محادثة محفوظة مسبقاً في المتصفح.<br>🔍 يمكنك البحث في القوانين باستخدام: "قانون [اسم القانون]"`, 'ai');
                }, 1000);
            }
        });
    </script>
</body>
</html>
