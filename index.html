<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العقل العلمي الخارق | القمة في الذكاء الاصطناعي</title>
    
    <!-- الخطوط والمكتبات الأساسية -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --neon-blue: #00f5ff;
            --neon-purple: #9d4edd;
            --deep-space: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background: var(--deep-space);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        /* خلفية الجسيمات المتحركة */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* شاشة التحميل */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background: var(--deep-space);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-circle {
            width: 100px;
            height: 100px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* شاشة تسجيل الدخول */
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 15, 35, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-blue);
        }

        .modern-input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .modern-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,245,255,0.2); }

        .btn-glow {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glow:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* الواجهة الرئيسية */
        #app-screen {
            display: none;
            height: 100vh;
            grid-template-rows: auto 1fr auto;
        }

        header {
            padding: 20px 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
        }

        .chat-area {
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 85%;
            padding: 18px 25px;
            border-radius: 20px;
            line-height: 1.7;
            position: relative;
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            border: 1px solid var(--neon-blue);
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon-purple);
            border-bottom-left-radius: 2px;
        }

        .input-container {
            padding: 25px 40px;
            background: rgba(0,0,0,0.5);
        }

        .input-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            background: var(--glass);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid rgba(0,245,255,0.2);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 16px;
            resize: none;
            max-height: 150px;
            outline: none;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            border: none;
            background: var(--neon-blue);
            color: var(--deep-space);
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover { transform: rotate(-10deg) scale(1.1); }

        .hidden { display: none !important; }

        /* ذكاء مضاف: شريط تحليل */
        .thinking-process {
            font-size: 12px;
            color: var(--neon-blue);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <!-- شاشة التحميل -->
    <div class="loader-overlay" id="loader">
        <div class="loader-circle"></div>
        <h2 style="margin-top: 25px; font-family: 'Orbitron'; letter-spacing: 5px; color: var(--neon-blue);">NEURAL CORE</h2>
        <p style="color: var(--glass); margin-top: 10px;">جاري مزامنة الوعي الاصطناعي...</p>
    </div>

    <!-- شاشة الدخول -->
    <div id="login-screen">
        <div class="glass-card">
            <i class="fas fa-brain" style="font-size: 60px; color: var(--neon-blue); margin-bottom: 20px;"></i>
            <h1 style="margin-bottom: 10px;">العقل العلمي المتطور</h1>
            <p style="color: #888; margin-bottom: 30px;">نظام الإدراك الفائق v5.0</p>
            
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="modern-input" placeholder="البريد الإلكتروني">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="pass" class="modern-input" placeholder="كلمة المرور">
            </div>
            
            <button class="btn-glow" onclick="Auth.login()" style="margin-bottom: 15px;">تسجيل الدخول</button>
            <button class="btn-glow" style="background: var(--glass); border: 1px solid var(--neon-blue);" onclick="Auth.guestMode()">الدخول كضيف</button>
            
            <p style="margin-top: 20px; font-size: 13px; color: #666;">نسيت كلمة المرور؟ اتصل بالنظام المركزي</p>
        </div>
    </div>

    <!-- واجهة التطبيق -->
    <div id="app-screen">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="padding: 10px; background: var(--neon-blue); color: #000; border-radius: 10px;">
                    <i class="fas fa-microchip"></i>
                </div>
                <div>
                    <h3 style="font-family: 'Orbitron';">SCIENTIFIC MIND AI</h3>
                    <span id="status" style="font-size: 12px; color: var(--neon-blue);">● متصل بالنواة</span>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="action-btn" style="background: var(--glass); color: white;" onclick="UI.clearChat()">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="action-btn" style="background: #ff4757; color: white;" onclick="Auth.logout()">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="chat-area" id="chat-box">
            <!-- الرسائل ستظهر هنا -->
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="اسأل عن أي معضلة علمية، رياضية أو فيزيائية..." rows="1"></textarea>
                <button class="action-btn" id="send-btn" onclick="Core.handleMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <p style="text-align: center; font-size: 11px; color: #555; margin-top: 10px;">
                النظام مدعوم بمحرك معالجة منطقية متطور يحلل ملايين الاحتمالات في الثانية
            </p>
        </div>
    </div>

    <script>
        // تكوين Firebase (استخدم بياناتك الحقيقية هنا)
        const firebaseConfig = {
            apiKey: "AIzaSyAI_mUhuPNoO-XC0Q-VNoWft8UWFbAbIGg",
            authDomain: "sudan-market-6b122.firebaseapp.com",
            databaseURL: "https://sudan-market-6b122-default-rtdb.firebaseio.com",
            projectId: "sudan-market-6b122",
            storageBucket: "sudan-market-6b122.appspot.com",
            messagingSenderId: "66729481566",
            appId: "1:66729481566:web:93393f28dc22d32cceebcf"
        };

        firebase.initializeApp(firebaseConfig);

        // --- محرك الأمان والمصادقة ---
        const Auth = {
            init() {
                firebase.auth().onAuthStateChanged(user => {
                    UI.toggleLoader(false);
                    if (user) {
                        this.launchApp(user);
                    } else {
                        document.getElementById('login-screen').style.display = 'flex';
                        document.getElementById('app-screen').style.display = 'none';
                    }
                });
            },
            async login() {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('pass').value;
                if(!email || !pass) return UI.notify("يرجى إدخال البيانات", "error");
                
                try {
                    UI.toggleLoader(true);
                    await firebase.auth().signInWithEmailAndPassword(email, pass);
                } catch (e) {
                    UI.toggleLoader(false);
                    UI.notify("خطأ في تسجيل الدخول: " + e.message, "error");
                }
            },
            guestMode() {
                UI.notify("تم الدخول بوضع الضيف (لن يتم حفظ البيانات)");
                this.launchApp({ email: 'Guest User', displayName: 'ضيف' });
            },
            launchApp(user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'grid';
                Core.welcome(user);
            },
            logout() {
                firebase.auth().signOut().then(() => location.reload());
            }
        };

        // --- النواة الذكية (الذكاء الاصطناعي) ---
        const Core = {
            isThinking: false,

            async handleMessage() {
                const input = document.getElementById('user-input');
                const text = input.value.trim();
                
                if (!text || this.isThinking) return;

                UI.addMessage(text, 'user');
                input.value = '';
                this.isThinking = true;

                // محاكاة التفكير العميق
                const thinkingMsg = UI.addThinking();
                
                try {
                    const response = await this.processLogic(text);
                    UI.removeThinking(thinkingMsg);
                    UI.addMessage(response, 'ai');
                } catch (e) {
                    UI.removeThinking(thinkingMsg);
                    UI.addMessage("حدث خلل في معالجة النواة. يرجى المحاولة لاحقاً.", 'ai');
                } finally {
                    this.isThinking = false;
                }
            },

            async processLogic(query) {
                // محاكي للذكاء الاصطناعي العلمي المتطور
                await new Promise(r => setTimeout(r, 1500)); // وقت للتفكير

                // معالجة رياضية إذا وجد تعبير
                try {
                    if (/[0-9+\-*/^()]/.test(query)) {
                        const cleanQuery = query.replace(/[أ-ي]/g, '').trim();
                        const result = math.evaluate(cleanQuery);
                        return `بناءً على التحليل الرياضي:\n\nالمعادلة: \`${cleanQuery}\`\nالنتيجة: **${result}**\n\nهل تود استخراج المشتقة أو التكامل لهذه الدالة؟`;
                    }
                } catch(e) {}

                // ردود ذكية علمية
                if (query.includes("جاذبية")) return "الجاذبية حسب النسبية العامة هي انحناء في الزمكان تسببه الكتلة. القانون التقليدي: F = G(m1m2)/r².";
                if (query.includes("من أنت")) return "أنا 'العقل العلمي المتطور'، واجهة ذكاء اصطناعي مصممة لحل المسائل المعقدة وتقديم الدعم البحثي المتقدم.";
                
                return `تم استقبال استفسارك: "${query}". \n\nالنظام يحلل حالياً المعطيات في قاعدة البيانات العلمية. يبدو أنك مهتم بـ (العلوم المتقدمة). هل يمكنك تقديم تفاصيل أكثر لأتمكن من بناء نموذج حل دقيق؟`;
            },

            welcome(user) {
                setTimeout(() => {
                    UI.addMessage(`مرحباً بك أيها العقل الراقي (${user.displayName || user.email}). تم تفعيل النواة المركزية بنجاح. أنا جاهز لمعالجة بياناتك.`, 'ai');
                }, 500);
            }
        };

        // --- واجهة المستخدم والتأثيرات ---
        const UI = {
            toggleLoader(show) {
                document.getElementById('loader').classList.toggle('hidden', !show);
            },
            addMessage(text, side) {
                const box = document.getElementById('chat-box');
                const div = document.createElement('div');
                div.className = `message ${side === 'user' ? 'user-msg' : 'ai-msg'}`;
                
                if(side === 'ai') {
                    div.innerHTML = `<div class="thinking-process"><div class="pulse"></div> تحليل البيانات مكتمل</div>` + text.replace(/\n/g, '<br>');
                } else {
                    div.textContent = text;
                }
                
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
                return div;
            },
            addThinking() {
                const box = document.getElementById('chat-box');
                const div = document.createElement('div');
                div.className = 'message ai-msg';
                div.innerHTML = `<div class="thinking-process"><div class="pulse"></div> جاري التفكير العميق وتحليل الاحتمالات...</div>`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
                return div;
            },
            removeThinking(el) { el.remove(); },
            notify(msg, icon = 'success') {
                Swal.fire({ icon, title: msg, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
            },
            clearChat() {
                document.getElementById('chat-box').innerHTML = '';
                this.notify("تم مسح السجل المؤقت");
            }
        };

        // --- نظام الجسيمات الخلفية ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x > canvas.width) this.x = 0;
                if(this.x < 0) this.x = canvas.width;
                if(this.y > canvas.height) this.y = 0;
                if(this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 245, 255, 0.2)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for(let i=0; i<100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // إطلاق كل شيء
        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();
        Auth.init();

        // مستمع لزر Enter للإرسال بسلاسة
        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                Core.handleMessage();
            }
        });
    </script>
</body>
</html>
