<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI | العقل العلمي الخارق</title>
    
    <!-- مكتبات المعالجة الرياضية والعلمية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    
    <!-- إصلاح روابط Firebase: إضافة -compat لتعمل مع الكود الحالي -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-magenta: #ff00ff;
            --deep-space: #020205;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(0, 245, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--deep-space);
            color: #e0e0e0;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .app-wrapper {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            border-left: 1px solid var(--border-glow);
            border-right: 1px solid var(--border-glow);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--border-glow);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0; font-size: 1.5rem;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .chat-container {
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid var(--neon-cyan);
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-magenta);
            border-bottom-left-radius: 2px;
        }

        .ai-msg::before {
            content: 'CORE ANALYSIS';
            display: block;
            font-size: 0.7rem;
            color: var(--neon-magenta);
            margin-bottom: 8px;
            font-family: 'Orbitron';
        }

        .input-box {
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #user-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--border-glow); }

        .send-btn {
            background: var(--neon-cyan);
            border: none;
            border-radius: 12px;
            width: 55px;
            cursor: pointer;
            color: black;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .math-res {
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="app-wrapper">
        <header>
            <h1>QUANTUM CORE v7.0</h1>
            <small style="color: #666;">نظام الاستدلال العلمي والمنطقي المتقدم</small>
        </header>

        <div class="chat-container" id="chat">
            <div class="message ai-msg">
                النظام مفعل. يمكنك الآن تعليمي أي شيء باستخدام صيغة: "احفظ [السؤال] جواب [الإجابة]".. أو طرح مسائل في الفيزياء والرياضيات مباشرة.
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="user-input" placeholder="مثلاً: احفظ قانون السرعة جواب المسافة تقسيم الزمن..." autocomplete="off">
            <button class="send-btn" onclick="processInput()"><i class="fas fa-microchip"></i></button>
        </div>
    </div>

    <script>
        // ========== تهيئة Firebase الإصدار المتوافق ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAI_mUhuPNoO-XC0Q-VNoWft8UWFbAbIGg",
            authDomain: "sudan-market-6b122.firebaseapp.com",
            databaseURL: "https://sudan-market-6b122-default-rtdb.firebaseio.com",
            projectId: "sudan-market-6b122",
            storageBucket: "sudan-market-6b122.firebasestorage.app",
            messagingSenderId: "66729481566",
            appId: "1:66729481566:web:93393f28dc22d32cceebcf"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const ScientificAI = {
            constants: { g: 9.80665, R: 8.314, c: 299792458 },

            // ========== التحليل المتقدم ==========
            async advancedAnalyze(q) {
                // 1. تحليل الرموز الرياضية
                const mathSymbols = {
                    '^': 'قانون الأسس',
                    '√': 'قانون الجذر التربيعي',
                    '/': 'قانون القسمة',
                    '×': 'قانون الضرب',
                    '*': 'قانون الضرب',
                    '+': 'قانون الجمع',
                    '-': 'قانون الطرح',
                    '=': 'قانون المساواة',
                    'π': 'قانون باي'
                };
                
                // 2. البحث عن القوانين ذات الصلة
                let relatedLaws = [];
                for (const [symbol, law] of Object.entries(mathSymbols)) {
                    if (q.includes(symbol)) {
                        const foundLaw = await this.searchBrain(law);
                        if (foundLaw) {
                            relatedLaws.push(`📌 ${law}: ${foundLaw}`);
                        }
                    }
                }
                
                // 3. إذا وجدنا قوانين ذات صلة
                if (relatedLaws.length > 0) {
                    let response = `🔍 **المسألة تستخدم:**<br>`;
                    response += relatedLaws.join('<br>');
                    response += `<br><br>🎯 **الحل العملي:**<br>`;
                    
                    // محاولة حل المسألة
                    try {
                        const solved = await this.solveMathWithSteps(q);
                        response += `<span class="math-res">${solved}</span>`;
                    } catch (e) {
                        console.error('خطأ في الحل:', e);
                        response += `لم أستطع حل المسألة تلقائياً، لكني أعرف القوانين المطلوبة.`;
                    }
                    return response;
                }
                
                // 4. إذا لم توجد قوانين ذات صلة
                return null;
            },
            
            // حل الرياضيات مع عرض الخطوات
            async solveMathWithSteps(q) {
    try {
        // تحويل الرموز مع الحفاظ على المسألة الأصلية
        const originalQ = q;
        let cleanQ = q
            .replace(/√/g, 'sqrt')
            .replace(/π/g, 'pi')
            .replace(/÷/g, '/')
            .replace(/×/g, '*')
            .replace(/أوجد|ما هو|قيمة|احسب|ما/g, '')
            .replace(/\s+/g, '');
        
        // حساب النتيجة
        const result = math.evaluate(cleanQ);
        
        // إنشاء خطوات الحل
        let steps = `🧮 <b>الحل التفصيلي:</b><br>`;
        
        // تحليل كل جزء
        if (originalQ.includes('^')) {
            const parts = originalQ.split('^');
            const base = parts[0].match(/\d+/)?.[0] || '؟';
            const afterCaret = parts[1]?.match(/\d+/)?.[0] || '؟';
            const pow = Math.pow(parseFloat(base), parseFloat(afterCaret));
            steps += `1. ${base}^${afterCaret} = ${pow}<br>`;
        }
        
        if (originalQ.includes('√')) {
            const sqrtMatch = originalQ.match(/√(\d+)/);
            if (sqrtMatch) {
                const num = sqrtMatch[1];
                const sqrtVal = Math.sqrt(parseFloat(num));
                steps += `2. √${num} = ${sqrtVal.toFixed(4)}<br>`;
            }
        }
        
        if (originalQ.includes('÷') || originalQ.includes('/')) {
            const divMatch = originalQ.match(/(\d+)\s*[÷\/]\s*(\d+)/);
            if (divMatch) {
                const num1 = divMatch[1];
                const num2 = divMatch[2];
                steps += `3. ${num1} ÷ ${num2} = ${(num1/num2).toFixed(4)}<br>`;
            }
        }
        
        if (originalQ.includes('π')) {
            steps += `4. π ≈ 3.1416<br>`;
        }
        
        steps += `<br>✅ <b>النتيجة النهائية:</b><br>`;
        steps += `<span style="color: #00ff00; font-size: 1.2em;">${originalQ} = ${result.toFixed(6)}</span>`;
        
        return steps;
    } catch (e) {
        console.error('خطأ في الحل:', e);
        // محاولة استخدام math.evaluate مباشرة
        try {
            const simpleResult = math.evaluate(q
                .replace(/√/g, 'sqrt')
                .replace(/π/g, 'pi')
                .replace(/×/g, '*')
                .replace(/÷/g, '/'));
            return `✅ <b>الحل المباشر:</b><br><span style="color: #00ff00;">${q} = ${simpleResult}</span>`;
        } catch (err) {
            throw e;
        }
    }
}
            
            // ========== الدالة الرئيسية ==========
            async analyze(input) {
                const cleanInput = input.toLowerCase().trim();
                
                // 1. الحفظ (يظل أولاً)
                if (cleanInput.startsWith('احفظ') && cleanInput.includes('جواب')) {
                    return await this.saveToBrain(cleanInput);
                }

                // 2. التحليل المتقدم للمسائل الرياضية
                if (/[0-9]/.test(cleanInput) && /[\^√\+\-\*\/=π]/.test(cleanInput)) {
                    const advancedResult = await this.advancedAnalyze(cleanInput);
                    if (advancedResult) return advancedResult;
                }

                // 3. البحث في قاعدة البيانات
                const storedResponse = await this.searchBrain(cleanInput);
                if (storedResponse) return storedResponse;

                // 4. الرياضيات الأساسية
                if (/[0-9]/.test(cleanInput) && (cleanInput.includes('=') || cleanInput.includes('^') || cleanInput.includes('sqrt') || cleanInput.includes('π'))) {
                    return await this.solveMathWithSteps(cleanInput);
                }

                // 5. الفيزياء
                if (cleanInput.includes('سرعة') || cleanInput.includes('قوة') || cleanInput.includes('تسارع')) {
                    return this.solvePhysics(cleanInput);
                }

                // 6. المنطق
                return this.logicalReasoning(cleanInput);
            },

            // ========== دوال الذاكرة ==========
            async saveToBrain(input) {
                try {
                    const parts = input.split('جواب');
                    if (parts.length < 2) return "⚠️ الصيغة غير مكتملة. استخدم: احفظ [سؤال] جواب [إجابة]";
                    
                    const question = parts[0].replace('احفظ', '').trim();
                    const answer = parts[1].trim();
                    
                    if (!question || !answer) return "⚠️ لا يمكن حفظ بيانات فارغة.";

                    const dbKey = question.replace(/[.#$\[\]]/g, "_");

                    await database.ref('brain/' + dbKey).set({
                        ans: answer,
                        time: new Date().toISOString()
                    });

                    return `✅ تم الحفظ بنجاح في الذاكرة المركزية.<br>السؤال: <b>${question}</b><br>الإجابة: <b>${answer}</b>`;
                } catch (e) {
                    console.error(e);
                    return "❌ فشل الحفظ. تأكد من إعدادات قاعدة البيانات.";
                }
            },

            async searchBrain(query) {
                try {
                    const dbKey = query.replace(/[.#$\[\]]/g, "_");
                    const snapshot = await database.ref('brain/' + dbKey).once('value');
                    if (snapshot.exists()) {
                        return snapshot.val().ans;
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            },

            // ========== دوال الحل ==========
            solveMath(q) {
                try {
                    // تحويل الرموز العربية إلى رموز mathjs
                    let equation = q
                        .replace(/√/g, 'sqrt')
                        .replace(/π/g, 'pi')
                        .replace(/÷/g, '/')
                        .replace(/×/g, '*')
                        .replace(/أوجد|ما هو|قيمة|احسب|ما/g, '');
                        
                    const result = math.evaluate(equation);
                    return `📝 **التحليل الرياضي:**<br><span class="math-res">${q} = ${result}</span>`;
                } catch (e) {
                    return "لم أستطع معالجة المعادلة، تأكد من كتابة الرموز الرياضية بشكل صحيح.";
                }
            },

            solvePhysics(q) {
                const nums = q.match(/\d+(\.\d+)?/g)?.map(Number) || [];
                if (q.includes('سرعة') && nums.length >= 2) {
                    return `🚀 **حل الفيزياء:**<br>السرعة = المسافة (${nums[0]}) ÷ الزمن (${nums[1]})<br><span class="math-res">الناتج = ${(nums[0]/nums[1]).toFixed(2)} م/ث</span>`;
                }
                return "يرجى تزويدي بالأرقام لحل المسألة الفيزيائية.";
            },

            logicalReasoning(q) {
                const responses = {
                    "مرحبا": "أهلاً بك في وحدة المعالجة المركزية. كيف يمكنني خدمتك؟",
                    "من انت": "أنا Quantum AI، نظام استدلال منطقي متطور متصل بقاعدة بيانات سحابية.",
                    "شكرا": "في الخدمة دائماً."
                };
                return responses[q] || "لم أجد إجابة مخزنة لهذه العبارة. يمكنك تعليمي إياها باستخدام أمر 'احفظ'.";
            }
        };

        function appendMsg(text, type, id = null) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            if (id) div.id = id;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function processInput() {
            const inputField = document.getElementById('user-input');
            const query = inputField.value.trim();
            if (!query) return;

            appendMsg(query, 'user');
            inputField.value = '';

            const thinkingId = "think_" + Date.now();
            appendMsg("<i class='fas fa-sync fa-spin'></i> جاري استرجاع البيانات من النواة...", 'ai', thinkingId);

            try {
                const response = await ScientificAI.analyze(query);
                const thinkElem = document.getElementById(thinkingId);
                if(thinkElem) thinkElem.innerHTML = response;
            } catch (error) {
                console.error(error);
                const thinkElem = document.getElementById(thinkingId);
                if(thinkElem) thinkElem.innerHTML = "حدث خطأ غير متوقع في المصفوفة.";
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processInput();
        });

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawBg() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f5ff11';
            for(let i=0; i<15; i++) {
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
            requestAnimationFrame(drawBg);
        }
        drawBg();
    </script>
</body>
</html>
