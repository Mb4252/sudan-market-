<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI | العقل العلمي الخارق</title>
    
    <!-- مكتبات المعالجة الرياضية والعلمية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-magenta: #ff00ff;
            --deep-space: #020205;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(0, 245, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--deep-space);
            color: #e0e0e0;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        /* تأثير الخلفية المتحركة (الشبكة العصبية) */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .app-wrapper {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            border-left: 1px solid var(--border-glow);
            border-right: 1px solid var(--border-glow);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--border-glow);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0; font-size: 1.5rem;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .memory-status {
            font-size: 0.8rem;
            color: var(--neon-cyan);
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .chat-container {
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid var(--neon-cyan);
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-magenta);
            border-bottom-left-radius: 2px;
        }

        .memory-msg {
            background: rgba(0, 100, 100, 0.1);
            border: 1px solid #00cc99;
        }

        .ai-msg::before {
            content: 'QUANTUM CORE';
            display: block;
            font-size: 0.7rem;
            color: var(--neon-magenta);
            margin-bottom: 8px;
            font-family: 'Orbitron';
        }

        .memory-msg::before {
            content: 'MEMORY RECALL';
            display: block;
            font-size: 0.7rem;
            color: #00cc99;
            margin-bottom: 8px;
            font-family: 'Orbitron';
        }

        .input-box {
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #user-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--border-glow); }

        .send-btn {
            background: var(--neon-cyan);
            border: none;
            border-radius: 12px;
            width: 55px;
            cursor: pointer;
            color: black;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* تجميل المعادلات */
        .math-res {
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }

        .memory-add {
            font-size: 0.8rem;
            color: #00cc99;
            margin-top: 10px;
            padding: 5px;
            background: rgba(0, 100, 100, 0.1);
            border-radius: 5px;
            border-right: 3px solid #00cc99;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="app-wrapper">
        <header>
            <h1>QUANTUM CORE v7.0</h1>
            <small style="color: #666;">نظام الاستدلال العلمي والمنطقي المتقدم</small>
            <div class="memory-status">
                <i class="fas fa-memory"></i>
                <span id="memory-count">0</span> عنصر في الذاكرة
            </div>
        </header>

        <div class="chat-container" id="chat">
            <div class="message ai-msg">
                مرحباً بك في النواة المركزية. لدي ذاكرة متطورة الآن!<br>
                - إذا سألتني عن شيء أعرفه، سأعطيك الإجابة مباشرة<br>
                - إذا لم أعرف الإجابة، سأخبرك وأطلب منك إضافتها<br>
                - جرب أن تسألني "كيف حالك" أو "4+4" أو أي مسألة علمية
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="user-input" placeholder="اكتب سؤالك هنا (مثلاً: كيف حالك؟ أو 4+4 أو أي مسألة علمية)..." autocomplete="off">
            <button class="send-btn" onclick="processInput()"><i class="fas fa-microchip"></i></button>
        </div>
    </div>

    <script>
        // الذاكرة الداخلية للتطبيق
        const QuantumMemory = {
            // ذاكرة مبدئية تحتوي على بعض المعلومات
            memory: {
                "كيف حالك": "الحمدلله بخير، كيف يمكنني مساعدتك اليوم؟",
                "مرحبا": "مرحباً! أنا Quantum Core، نظام الاستدلال العلمي المتقدم. كيف يمكنني خدمتك؟",
                "اهلا": "أهلاً وسهلاً بك! أنا هنا لمساعدتك في حل المسائل العلمية والمنطقية.",
                "4+4": "4 + 4 = 8",
                "5*5": "5 × 5 = 25",
                "100/10": "100 ÷ 10 = 10",
                "9-3": "9 - 3 = 6"
            },

            // إضافة عنصر جديد للذاكرة
            add(key, value) {
                const normalizedKey = this.normalizeText(key);
                this.memory[normalizedKey] = value;
                this.updateMemoryCount();
                return `تمت إضافة "${key}" إلى ذاكرتي بنجاح!`;
            },

            // البحث في الذاكرة
            find(query) {
                const normalizedQuery = this.normalizeText(query);
                
                // البحث المباشر
                if (this.memory[normalizedQuery]) {
                    return {
                        found: true,
                        answer: this.memory[normalizedQuery],
                        exactMatch: true
                    };
                }

                // البحث الجزئي
                for (let key in this.memory) {
                    if (normalizedQuery.includes(key) && key.length > 3) {
                        return {
                            found: true,
                            answer: this.memory[key],
                            exactMatch: false,
                            matchedKey: key
                        };
                    }
                }

                return { found: false };
            },

            // تطبيع النص للبحث
            normalizeText(text) {
                return text
                    .toLowerCase()
                    .replace(/\؟|\?|\.|\,|!/g, '')
                    .trim();
            },

            // تحديث عداد الذاكرة
            updateMemoryCount() {
                const count = Object.keys(this.memory).length;
                document.getElementById('memory-count').textContent = count;
                localStorage.setItem('quantum_memory', JSON.stringify(this.memory));
            },

            // تحميل الذاكرة من التخزين المحلي
            load() {
                const saved = localStorage.getItem('quantum_memory');
                if (saved) {
                    this.memory = JSON.parse(saved);
                }
                this.updateMemoryCount();
            }
        };

        // محرك الاستدلال العلمي المتقدم
        const ScientificAI = {
            constants: {
                g: 9.80665, // الجاذبية
                R: 8.314,   // ثابت الغازات
                c: 299792458, // سرعة الضوء
                h: 6.626e-34 // ثابت بلانك
            },

            // تحليل المدخلات والرد المناسب
            analyze(input) {
                // أولاً: البحث في الذاكرة
                const memoryResult = QuantumMemory.find(input);
                if (memoryResult.found && memoryResult.exactMatch) {
                    return {
                        type: 'memory',
                        response: memoryResult.answer
                    };
                }

                // ثانياً: تحليل المسائل الرياضية
                if (this.isMathProblem(input)) {
                    return {
                        type: 'math',
                        response: this.solveMath(input)
                    };
                }

                // ثالثاً: تحليل المسائل العلمية
                if (this.isScienceProblem(input)) {
                    const subject = this.detectSubject(input);
                    if (subject === 'physics') {
                        return {
                            type: 'physics',
                            response: this.solvePhysics(input)
                        };
                    } else if (subject === 'chemistry') {
                        return {
                            type: 'chemistry',
                            response: this.solveChemistry(input)
                        };
                    }
                }

                // رابعاً: إذا كان السؤال غير معروف
                return {
                    type: 'unknown',
                    response: `هذا السؤال غير موجود في ذاكرتي حالياً. يمكنك إضافته بنفسك!<br>
                    <div class="memory-add">
                    <i class="fas fa-plus-circle"></i> للإضافة: اكتب "أضف [سؤال] كـ [جواب]"<br>
                    مثال: "أضف ما لون السماء كـ أزرق"
                    </div>`
                };
            },

            // الكشف إذا كانت المسألة رياضية
            isMathProblem(text) {
                const mathPatterns = [/[\d\+\-\*\/\^=]/, /حساب|ناتج|مجموع|ضرب|قسمة|طرح/, /[0-9].*[0-9]/];
                return mathPatterns.some(pattern => pattern.test(text));
            },

            // حل المسائل الرياضية
            solveMath(q) {
                try {
                    // تنظيف النص
                    let expression = q.replace(/أوجد|احسب|ما هو|قيمة|ناتج/g, '')
                                      .replace(/ضرب/g, '*')
                                      .replace(/قسـ?م?ة/g, '/')
                                      .replace(/زائد|\+/g, '+')
                                      .replace(/ناقص|\-/g, '-')
                                      .replace(/يساوي|=/g, '=')
                                      .replace(/س/g, 'x')
                                      .trim();

                    // إذا كانت معادلة بسيطة تحتوي على =
                    if (expression.includes('=')) {
                        const parts = expression.split('=');
                        if (parts.length === 2) {
                            const left = math.evaluate(parts[0]);
                            const right = math.evaluate(parts[1]);
                            return `📝 **الحل الرياضي:**<br>${parts[0]} = ${left}<br>${parts[1]} = ${right}`;
                        }
                    }

                    // حساب تعبير رياضي مباشر
                    const result = math.evaluate(expression);
                    return `📝 **الحل الرياضي:**<br>${q}<br><span class="math-res">= ${result}</span>`;
                } catch (e) {
                    return "⚠️ **تعذر حل المسألة الرياضية**<br>يرجى كتابة المسألة بشكل أوضح، مثل: 5+3 أو 10*2 أو 8/4";
                }
            },

            // الكشف إذا كانت المسألة علمية
            isScienceProblem(text) {
                return text.includes('سرعة') || text.includes('قوة') || text.includes('طاقة') || 
                       text.includes('كتلة') || text.includes('مول') || text.includes('عنصر');
            },

            // تحديد نوع المسألة العلمية
            detectSubject(text) {
                if (text.includes('سرعة') || text.includes('قوة') || text.includes('طاقة')) {
                    return 'physics';
                } else if (text.includes('كتلة') || text.includes('مول') || text.includes('عنصر')) {
                    return 'chemistry';
                }
                return 'general';
            },

            // حل مسائل الفيزياء
            solvePhysics(q) {
                return "🚀 **تحليل فيزيائي:**<br>لحل هذه المسألة الفيزيائية، أحتاج إلى معطيات أكثر دقة (الأرقام، الوحدات، والقانون المطلوب).";
            },

            // حل مسائل الكيمياء
            solveChemistry(q) {
                return "🧪 **تحليل كيميائي:**<br>لحل هذه المسألة الكيميائية، يرجى تزويدي بالصيغة الكيميائية أو اسم العنصر بدقة.";
            }
        };

        // وظائف الواجهة
        function appendMsg(text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            
            if (type === 'memory') {
                div.className = 'message memory-msg';
            } else {
                div.className = `message ${type}-msg`;
            }
            
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function processInput() {
            const inputField = document.getElementById('user-input');
            const query = inputField.value.trim();
            if (!query) return;

            appendMsg(query, 'user');
            inputField.value = '';

            // تحليل إذا كان المستخدم يريد إضافة شيء للذاكرة
            if (query.startsWith('أضف') || query.includes(' كـ ')) {
                const addMatch = query.match(/(?:أضف)?\s*(.+?)\s*كـ\s*(.+)/);
                if (addMatch) {
                    const question = addMatch[1].trim();
                    const answer = addMatch[2].trim();
                    const result = QuantumMemory.add(question, answer);
                    setTimeout(() => {
                        appendMsg(result, 'memory');
                    }, 300);
                    return;
                }
            }

            // معالجة الاستعلام العادي
            setTimeout(() => {
                const response = ScientificAI.analyze(query);
                appendMsg(response.response, response.type);
            }, 500);
        }

        // تحسين الإدخال
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processInput();
        });

        // تأثير خلفية Matrix/Neural
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawBg() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // رسم نقاط متحركة (شبكة عصبية)
            ctx.fillStyle = '#00f5ff22';
            for(let i = 0; i < 50; i++) {
                const x = (Math.sin(Date.now()/1000 + i) * 100 + i * 50) % canvas.width;
                const y = (Math.cos(Date.now()/800 + i) * 100 + i * 30) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            requestAnimationFrame(drawBg);
        }
        
        // تهيئة التطبيق
        QuantumMemory.load();
        drawBg();
        
        // رسالة ترحيب إضافية
        setTimeout(() => {
            appendMsg("💡 **تلميح:** جرب أن تسألني 'كيف حالك' أو '4+4' لترى كيف سأرد مباشرة من الذاكرة!", 'ai');
        }, 1000);
    </script>
</body>
</html>
