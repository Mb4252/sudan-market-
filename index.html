<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-LOGIC | المحرك العلمي الخارق</title>
    
    <!-- المكتبات العلمية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.7/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.7/dist/katex.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --bg-dark: #05050a;
            --glass-panel: rgba(15, 15, 25, 0.9);
        }

        body {
            margin: 0; background: var(--bg-dark); color: #fff;
            font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden;
        }

        /* واجهة متطورة */
        .main-frame {
            display: grid; grid-template-rows: 80px 1fr 100px;
            height: 100vh; max-width: 1100px; margin: 0 auto;
            border-inline: 1px solid rgba(0, 210, 255, 0.2);
            background: radial-gradient(circle at center, #101020 0%, #05050a 100%);
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-bottom: 1px solid var(--neon-blue);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.1);
        }

        .status-light {
            width: 10px; height: 10px; background: #0f0; border-radius: 50%;
            display: inline-block; margin-left: 10px; box-shadow: 0 0 10px #0f0;
        }

        #chat-flow {
            padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
        }

        .bubble {
            max-width: 85%; padding: 20px; border-radius: 8px;
            line-height: 1.8; position: relative;
            backdrop-filter: blur(5px); transition: 0.3s;
        }

        .ai-bubble {
            background: rgba(100, 100, 255, 0.05);
            border-right: 4px solid var(--neon-blue);
            align-self: flex-start;
        }

        .user-bubble {
            background: rgba(157, 80, 187, 0.1);
            border-left: 4px solid var(--neon-purple);
            align-self: flex-end;
        }

        .control-room {
            padding: 20px; background: rgba(0,0,0,0.5);
            display: flex; gap: 15px; align-items: center;
        }

        #user-input {
            flex: 1; background: #0a0a15; border: 1px solid #333;
            border-radius: 5px; padding: 15px; color: var(--neon-blue);
            font-family: 'monospace'; font-size: 1.1rem;
        }

        .action-btn {
            background: var(--neon-blue); border: none; padding: 15px 30px;
            border-radius: 5px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }

        .action-btn:hover { filter: brightness(1.3); transform: scale(1.02); }

        .formula-box {
            background: #000; padding: 15px; border-radius: 5px;
            margin: 10px 0; border: 1px solid #1a1a1a; overflow-x: auto;
        }

        /* التحميل */
        .calculating { font-style: italic; color: var(--neon-blue); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="main-frame">
        <header>
            <div><span class="status-light"></span> <span style="font-family: Orbitron;">LOGIC CORE V8.0.1</span></div>
            <div style="font-weight: 900; letter-spacing: 2px;">نظام الاستدلال التحليلي</div>
        </header>

        <div id="chat-flow">
            <div class="bubble ai-bubble">
                تم تفعيل البروتوكول العلمي. 
                أنا جاهز لتحليل المسائل الرياضية، الكيميائية، والفيزيائية المعقدة (بما في ذلك ديناميكا السوائل).
                <br><b>أدخل المعطيات مباشرة دون مقدمات.</b>
            </div>
        </div>

        <div class="control-room">
            <input type="text" id="user-input" placeholder="مثال: احسب ضغط سائل كثافته 1000 على عمق 5 متر..." autocomplete="off">
            <button class="action-btn" onclick="processQuery()">معالجة <i class="fas fa-atom"></i></button>
        </div>
    </div>

    <script>
        const Engine = {
            // محرك حل السوائل
            fluids: {
                calculatePressure: (rho, g, h) => rho * g * h,
                calculateBuoyancy: (rho, v, g) => rho * v * g
            },

            analyze(input) {
                let text = input.toLowerCase();
                
                // 1. معالجة السوائل (سياق السوائل)
                if (text.includes('سائل') || text.includes('ضغط') || text.includes('كثافة')) {
                    return this.solveFluidPhysics(text);
                }

                // 2. معالجة الكيمياء (كتلة مولية، تفاعلات)
                if (text.includes('مول') || text.includes('كتلة') || text.match(/[H-Z][a-z]?\d*/)) {
                    return this.solveChemistry(text);
                }

                // 3. معالجة الرياضيات (تفاضل، تكامل، معادلات)
                return this.solveMath(text);
            },

            solveMath(q) {
                try {
                    let expression = q.replace(/حل|احسب|ما هو|ناتج/g, '').trim();
                    // استخدام mathjs لحل التفاضل إذا وجد
                    if(expression.includes('تفاضل') || expression.includes('derivative')) {
                        let target = expression.replace(/تفاضل|derivative/g, '').trim();
                        let res = math.derivative(target, 'x').toString();
                        return this.formatRes("تفاضل تحليلي", `\\frac{d}{dx}(${target}) = ${res}`);
                    }

                    let result = math.evaluate(expression);
                    return this.formatRes("معالجة رياضية", `${expression} = ${result}`);
                } catch (e) {
                    return "خطأ في بناء الجملة الرياضية. يرجى استخدام رموز مثل ^ للقوة و * للضرب.";
                }
            },

            solveFluidPhysics(q) {
                const nums = q.match(/\d+(\.\d+)?/g)?.map(Number) || [];
                // مسألة ضغط السوائل P = rho * g * h
                if (q.includes('ضغط') && nums.length >= 2) {
                    let rho = nums[0]; // الكثافة
                    let h = nums[1];   // العمق
                    let g = 9.81;
                    let p = this.fluids.calculatePressure(rho, g, h);
                    return this.formatRes("ديناميكا السوائل", `P = \\rho \cdot g \cdot h = ${rho} \cdot 9.81 \cdot ${h} = ${p.toFixed(2)} \\text{ Pascal}`);
                }
                return "يرجى تحديد الكثافة والعمق لحساب الضغط الهيدروستاتيكي.";
            },

            solveChemistry(q) {
                // محرك كيميائي مبسط للكتلة المولية
                const table = { 'H': 1, 'O': 16, 'C': 12, 'N': 14, 'Na': 23, 'Cl': 35.5 };
                let formula = q.match(/[A-Z][a-z]?\d*/g);
                if (formula) {
                    return this.formatRes("تحليل كيميائي", `الصيغة المرصودة: ${formula.join('')} - جاري استخراج الخصائص الفيزيائية...`);
                }
                return "يرجى إدخال الصيغة الكيميائية بشكل صحيح (مثل H2O).";
            },

            formatRes(title, latex) {
                return `
                    <div style="color:var(--neon-blue); font-weight:bold; margin-bottom:10px;">[${title}]</div>
                    <div class="formula-box" id="${Math.random().toString(36).substr(2, 9)}">
                        ${latex}
                    </div>
                `;
            }
        };

        function processQuery() {
            const input = document.getElementById('user-input');
            const flow = document.getElementById('chat-flow');
            if (!input.value.trim()) return;

            // إضافة رسالة المستخدم
            flow.innerHTML += `<div class="bubble user-bubble">${input.value}</div>`;
            
            const currentQuery = input.value;
            input.value = '';

            // معالجة فورية
            setTimeout(() => {
                const response = Engine.analyze(currentQuery);
                const id = Math.random().toString(36).substr(2, 9);
                flow.innerHTML += `<div class="bubble ai-bubble" id="${id}">${response}</div>`;
                
                // تحويل أي نص داخل formula-box إلى معادلة LaTeX
                document.querySelectorAll('.formula-box').forEach(box => {
                    if(!box.classList.contains('rendered')) {
                        katex.render(box.innerText, box, { throwOnError: false });
                        box.classList.add('rendered');
                    }
                });

                flow.scrollTop = flow.scrollHeight;
            }, 100);
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processQuery();
        });
    </script>
</body>
</html>
